<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Player</title>
    <script libs="core,three,threeview" src="../share/cdn.js"></script>
</head>
<body>
    <div id="app" v-cloak class="player-container" @dragover.prevent @drop.prevent="handleDrop">

        <!-- Floating High-Fidelity HUD Controller Overlay -->
        <div class="hud-header" :class="{ 'hud-active': mediaUrl }">
            <div class="min-w-0">
                <h1 class="text-xl font-black tracking-tight uppercase truncate max-w-[500px]">
                    {{ fileName || 'Avero Player' }}
                </h1>
                <div class="flex items-center gap-3 mt-1">
                    <span v-if="fileCategory" class="type-tag">{{ fileCategory }}</span>
                    <p class="text-[8px] text-zinc-400 font-bold tracking-[0.3em] uppercase font-mono">
                        Avero OS // File Relay v3.0
                    </p>
                </div>
            </div>
            <button v-if="mediaUrl" @click="resetPlayer" class="btn-main !bg-red-500/10 !text-red-400 border border-red-500/20 text-[10px] hover:!bg-red-500 hover:!text-black transition-colors duration-200">Eject</button>
        </div>

        <!-- Expanded Full-Screen Main Viewport Canvas -->
        <div class="viewport">
            <div v-if="!mediaUrl" class="drop-zone" @click="$refs.fileInput.click()">
                <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center border border-white/10 mb-4 transition-all duration-300 hover:scale-110">
                    <span class="text-xl">📂</span>
                </div>
                <p class="text-zinc-400 font-bold text-[10px] uppercase tracking-[0.8em] mb-4 font-mono">Drop Media Anywhere</p>
                <button class="btn-main text-xs">Open File Explorer</button>
            </div>

            <video v-if="fileCategory === 'VIDEO'" :src="mediaUrl" controls autoplay></video>

            <img v-if="fileCategory === 'IMAGE'" :src="mediaUrl" alt="Preview">

            <div v-if="fileCategory === 'AUDIO'" class="flex flex-col items-center w-full max-w-xl px-6">
                <div class="w-32 h-32 bg-zinc-900/50 backdrop-blur-md border border-white/5 rounded-full mb-8 flex items-center justify-center animate-pulse shadow-2xl">
                    <div class="w-16 h-16 bg-indigo-500/20 border border-indigo-500/30 rounded-full flex items-center justify-center">
                        <div class="w-6 h-6 bg-indigo-400 rounded-full"></div>
                    </div>
                </div>
                <audio :src="mediaUrl" controls autoplay></audio>
            </div>

            <!-- 3D Viewport Target -->
            <div v-show="fileCategory === '3D'" ref="threeContainer" class="w-full h-full"></div>
        </div>

        <!-- Added .gltf and .glb support -->
        <input type="file" ref="fileInput" class="file-input" @change="handleFile" accept="image/*,video/*,audio/*,.gltf,.glb">

        <!-- Floating Bottom Status Bar Panel -->
        <div class="hud-footer">
            <span class="text-[9px] font-black text-zinc-500 font-mono uppercase tracking-widest">
                {{ rawType || 'Ready Vector Protocol' }}
            </span>
            <div class="flex gap-1.5 items-center">
                <div class="w-1 h-1 bg-zinc-700 rounded-full"></div>
                <div class="w-1 h-1 bg-zinc-700 rounded-full"></div>
                <div class="w-8 h-1 bg-zinc-700/50 rounded-full overflow-hidden">
                    <div v-if="mediaUrl" class="w-full h-full bg-indigo-500 animate-pulse"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3D engine script loads first, followed by application lifecycle manager -->
    <script src="3d.js"></script>
    <script src="index.js"></script>
</body>
</html>
