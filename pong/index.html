<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avero Pong</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body class="bg-[#080808] text-slate-200 font-sans overflow-hidden select-none touch-none flex items-center justify-center min-h-screen">
    <div id="app" v-cloak class="h-screen w-screen flex flex-col justify-between items-center p-3 box-border overflow-hidden">

        <div class="flex w-full max-w-[800px] justify-between items-center px-2 py-1 flex-none">
            <div class="text-left">
                <span class="retro-label">Player 1 (W/S)</span>
                <span class="retro-value text-indigo-400 font-mono">{{ scores.p1 }}</span>
            </div>
            <div class="text-center font-mono text-[10px] text-zinc-600 uppercase tracking-widest hidden sm:block">
                First to 7 wins
            </div>
            <div class="text-right">
                <span class="retro-label">Player 2 (▲/▼)</span>
                <span class="retro-value text-emerald-400 font-mono">{{ scores.p2 }}</span>
            </div>
        </div>

        <div class="flex-1 w-full max-w-[800px] flex items-center justify-center p-1 overflow-hidden">
            <div class="w-full h-full flex justify-center items-center" ref="arenaWrapper">
                <div class="relative game-border p-1 bg-white/5 rounded-2xl box-border flex items-center justify-center">
                    <canvas ref="pongCanvas" class="bg-black rounded-xl block shadow-inner"></canvas>

                    <div v-if="!gameState.running" class="absolute inset-0 flex items-center justify-center bg-black/85 backdrop-blur-sm rounded-2xl z-50">
                        <div class="text-center px-6">
                            <h2 class="text-3xl md:text-5xl font-black italic tracking-tighter mb-2 uppercase text-white">
                                {{ gameState.gameOver ? 'Match Concluded' : 'Avero Pong' }}
                            </h2>
                            <p v-if="gameState.gameOver" class="text-zinc-400 font-mono text-xs uppercase tracking-wider mb-6">
                                Winner: <span :class="winner === 1 ? 'text-indigo-400' : 'text-emerald-400'">Player {{ winner }}</span>
                            </p>
                            <p v-else class="text-zinc-500 font-mono text-[10px] uppercase tracking-widest mb-6">
                                P1: W/S keys | P2: Arrow keys
                            </p>
                            <button @click="startMatch" class="avero-btn text-xs">
                                {{ gameState.gameOver ? 'Rematch' : 'Launch System' }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="h-2 w-full flex-none"></div>

    </div>
    <script src="index.js"></script>
</body>
</html>
