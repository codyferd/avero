<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Avero Chess</title>
    <script libs="core,chess,peer" src="../share/cdn.js"></script>
</head>
<body class="bg-[#050505] text-slate-300 font-sans overflow-hidden">

    <div id="app" v-cloak>
        <!-- Start Screen / Lobby -->
        <div v-if="!gameStarted" class="h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-950/20 via-transparent to-transparent">
            <div class="p-12 text-center max-w-md border-t-2 border-emerald-500/50 bg-white/[0.02] rounded-3xl backdrop-blur-md shadow-2xl">
                <h1 class="text-7xl font-black italic tracking-tighter mb-2 text-white uppercase">Chess</h1>
                <p class="text-[9px] uppercase tracking-[0.4em] text-emerald-500 font-bold mb-10">Avero Strategic Mesh</p>

                <div class="space-y-4">
                    <button @click="initLocalGame" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs uppercase hover:scale-[1.02] active:scale-95 transition-all shadow-xl">
                        Local PvP Match
                    </button>
                    <button @click="initAiGame" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black text-xs uppercase hover:scale-[1.02] active:scale-95 transition-all shadow-xl">
                        Play vs AI
                    </button>

                    <div class="flex items-center gap-4 my-6">
                        <div class="h-[1px] flex-grow bg-white/10"></div>
                        <span class="text-[9px] font-black text-slate-600 uppercase tracking-widest">Mesh Protocol</span>
                        <div class="h-[1px] flex-grow bg-white/10"></div>
                    </div>

                    <div class="bg-white/5 p-5 rounded-2xl border border-white/10">
                        <input v-model="lobbyId" @input="formatLobbyId" placeholder="Room Name..."
                               class="w-full bg-black/40 border border-white/5 rounded-lg p-3 text-center text-white outline-none focus:border-emerald-500 transition-all mb-4 text-sm font-mono">

                        <div class="flex gap-2">
                            <button @click="hostMeshGame" class="flex-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 py-3 rounded-lg font-black text-[10px] uppercase hover:bg-emerald-500 hover:text-black transition-all">
                                Host
                            </button>
                            <button @click="joinMeshGame" class="flex-1 bg-white/5 border border-white/10 text-white py-3 rounded-lg font-black text-[10px] uppercase hover:bg-white/10 transition-all">
                                Join
                            </button>
                        </div>
                    </div>
                </div>

                <p v-if="meshStatus" class="mt-6 text-[9px] font-mono text-rose-400 uppercase tracking-tight">{{ meshStatus }}</p>
            </div>
        </div>

        <!-- Main Game Interface -->
        <div v-else class="game-container">

            <!-- Sidebar: Opening Detection & Move History -->
            <aside class="opening-sidebar">
                <div class="opening-header">
                    <span class="text-[8px] font-black text-slate-500 uppercase tracking-[0.2em] block mb-2">Detected Opening</span>
                    <h2 class="opening-name">{{ currentOpening || 'Standard Development' }}</h2>
                </div>

                <div class="flex-grow overflow-hidden flex flex-col p-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black text-slate-500 uppercase">Notation</span>
                        <div class="status-badge">{{ connectionMode }}</div>
                    </div>

                    <div class="flex-grow overflow-y-auto no-scrollbar space-y-2 pr-2">
                        <div v-for="(m, i) in moveHistory" :key="i"
                             class="flex gap-4 items-center p-2 rounded-lg"
                             :class="i % 2 === 0 ? 'bg-white/5' : ''">
                            <span class="w-6 text-slate-700 font-bold text-[10px]">{{ Math.floor(i/2) + 1 }}.</span>
                            <span class="text-[11px] font-mono font-bold" :class="i % 2 === 0 ? 'text-white' : 'text-emerald-400'">{{ m.san }}</span>
                        </div>
                    </div>

                    <div class="mt-6 pt-6 border-t border-white/5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="text-[8px] font-black text-slate-600 uppercase mb-2">White Material</div>
                                <div class="flex flex-wrap gap-1 min-h-[20px]">
                                    <img v-for="p in captured.w" :src="getPieceURL({type: p, color: 'b'})" class="w-4 h-4 opacity-30" />
                                </div>
                            </div>
                            <div>
                                <div class="text-[8px] font-black text-slate-600 uppercase mb-2">Black Material</div>
                                <div class="flex flex-wrap gap-1 min-h-[20px]">
                                    <img v-for="p in captured.b" :src="getPieceURL({type: p, color: 'w'})" class="w-4 h-4 opacity-30" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Board Section -->
            <main class="board-section">
                <!-- Live Evaluation -->
                <div class="eval-bar-container">
                    <div class="eval-fill" :style="{ height: evalScore + '%' }"></div>
                </div>

                <!-- Chess Board -->
                <div :class="['board-grid', flipped ? 'rotate-180' : '']">
                    <template v-for="(row, rIdx) in boardState">
                        <div v-for="(square, sIdx) in row"
                             :class="['square', (rIdx + sIdx) % 2 === 0 ? 'light' : 'dark', isSelected(rIdx, sIdx) ? 'selected' : '', isLastMove(rIdx, sIdx) ? 'last-move' : '']"
                             @click="handleSquareClick(rIdx, sIdx)">

                            <span v-if="sIdx === 0" class="coord rank">{{ 8 - rIdx }}</span>
                            <span v-if="rIdx === 7" class="coord file">{{ String.fromCharCode(97 + sIdx) }}</span>

                            <div v-if="isLegalMove(rIdx, sIdx)" class="move-hint"></div>
                            <div v-if="isCaptureMove(rIdx, sIdx)" class="capture-hint"></div>

                            <img v-if="square" :src="getPieceURL(square)" class="piece-img" />
                        </div>
                    </template>
                </div>

                <!-- HUD Controls -->
                <div class="absolute bottom-8 right-8 flex gap-3">
                    <button @click="flipped = !flipped" class="p-4 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 hover:bg-white/10 transition-all group">
                        <svg class="w-5 h-5 text-emerald-500 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button @click="resetGame" class="p-4 bg-rose-500/10 backdrop-blur-xl rounded-2xl border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all text-rose-500">
                        <span class="text-[10px] font-black uppercase">Exit</span>
                    </button>
                </div>
            </main>
        </div>

        <!-- Toast for kicks/room full -->
        <div v-if="errorToast" class="error-toast animate-bounce">{{ errorToast }}</div>

        <!-- End Match Modal -->
        <div v-if="gameOverMessage" class="absolute inset-0 z-[100] modal-blur flex items-center justify-center p-6">
            <div class="p-12 text-center max-w-sm bg-[#0a0a0a] border border-white/10 rounded-[2.5rem] shadow-2xl">
                <h2 class="text-3xl font-black italic mb-2 text-white uppercase tracking-tighter">Match End</h2>
                <p class="text-slate-500 text-[10px] uppercase tracking-widest mb-8">{{ gameOverMessage }}</p>
                <button @click="resetGame" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black text-sm uppercase hover:bg-emerald-400 transition-all">
                    Return to Lobby
                </button>
            </div>
        </div>
    </div>

    <script src="mesh.js"></script>
    <script src="index.js"></script>
</body>
</html>
