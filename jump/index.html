<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
        <title>Avero Jump</title>
        <script libs="core,phaser" src="../share/cdn.js"></script>
    </head>
    <body>
        <div id="app" :style="{ backgroundColor: settings.colors.bg }">
            
            <!-- Central Game Target Container centered by parent CSS layout constraints -->
            <div id="game-container"></div>

            <div id="ui" class="absolute inset-0 z-10 pointer-events-none text-white p-6 flex flex-col justify-between select-none">
                <div class="absolute bottom-4 right-6 opacity-30 text-[10px] font-bold uppercase tracking-widest">
                    Version 1.3
                </div>

                <!-- Overlay Settings Panel Menu Card -->
                <div v-if="gameState !== 'playing'" class="pointer-events-auto absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm">
                    <div class="menu-card flex flex-col items-center w-full max-w-sm gap-4 p-6 rounded-[2rem] shadow-2xl mx-4 max-h-[90vh] overflow-y-auto">
                        <h1 class="text-3xl font-black italic uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-500">Avero Jump</h1>

                        <div v-if="gameState !== 'start'" class="text-center bg-white/5 w-full py-2 rounded-xl border border-white/10">
                            <p class="text-2xl font-black italic leading-none text-red-400">Game Over</p>
                            <p class="text-xl font-bold italic mt-1">Score: {{ score }}</p>
                        </div>

                        <button @click="handlePrimary" class="w-full bg-white text-black py-3 rounded-lg font-black uppercase active:scale-95 hover:bg-neutral-200 transition-all shadow-lg tracking-wide">
                            {{ gameState === 'paused' ? 'Resume Match' : 'Launch Game' }}
                        </button>

                        <div class="grid grid-cols-2 gap-2 w-full">
                            <button v-for="m in ['tuning','style']" :key="m" @click="view = view===m?'':m" :class="view===m?'bg-white text-black':'bg-white/10 text-white hover:bg-white/20'" class="p-2 rounded-lg text-[11px] font-black uppercase transition-colors tracking-wider border border-white/5">
                                {{m}}
                            </button>
                        </div>

                        <!-- Config Options Engine Fields -->
                        <div v-if="view === 'tuning'" class="w-full flex flex-col gap-3 p-4 bg-white/5 rounded-xl border border-white/10 transition-all animate-fade-in">
                            <div class="grid grid-cols-4 gap-1 mb-1">
                                <button v-for="(p, n) in presets" :key="n" @click="applyDiff(n)" class="bg-white/10 hover:bg-white/20 p-1.png rounded text-[8px] font-bold uppercase truncate border border-white/5">
                                    {{n}}
                                </button>
                            </div>
                            <div class="h-[200px] overflow-y-auto pr-1 flex flex-col gap-3 custom-scrollbar">
                                <div v-for="f in fields" :key="f.k" class="flex flex-col bg-black/20 p-2 rounded-lg border border-white/5">
                                    <div class="flex justify-between text-[10px] font-bold opacity-75 uppercase mb-1 tracking-wide">
                                        <span class="text-neutral-300">{{f.n}}</span><span class="text-yellow-400">{{settings[f.k]}}</span>
                                    </div>
                                    <input type="range" v-model.number="settings[f.k]" :min="f.min" :max="f.max" @input="refresh" class="w-full cursor-pointer" />
                                </div>
                            </div>
                        </div>

                        <!-- Stylization & Aesthetics Interface Panel -->
                        <div v-if="view === 'style'" class="w-full flex flex-col gap-3 p-4 bg-white/5 rounded-xl border border-white/10 transition-all">
                            <div class="grid grid-cols-4 gap-1 mb-1">
                                <button v-for="t in themes" :key="t" @click="applyStyle(t)" class="bg-white/10 hover:bg-white/20 p-1 rounded text-[9px] font-black uppercase border border-white/5">
                                    {{t}}
                                </button>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div v-for="(c, p) in settings.colors" :key="p" class="flex items-center justify-between bg-black/40 p-2 rounded-lg border border-white/10">
                                    <span class="text-[9px] font-black uppercase tracking-wider text-neutral-400">{{p}}</span>
                                    <input type="color" v-model="settings.colors[p]" @input="refresh" class="w-6 h-6 bg-transparent cursor-pointer rounded overflow-hidden" />
                                </div>
                            </div>
                        </div>

                        <button @click="resetConfig" class="text-[9px] opacity-30 uppercase font-bold hover:opacity-100 hover:text-red-400 transition-all tracking-widest mt-1">Reset Engine Data</button>
                    </div>
                </div>

                <!-- HUD Overlay Configuration when Gameplay Loop Is Active -->
                <div v-if="gameState === 'playing'" class="flex justify-between items-start pointer-events-none w-full max-w-7xl mx-auto">
                    <div class="bg-black/30 p-4 rounded-2xl backdrop-blur-md border border-white/5 shadow-lg">
                        <div class="text-4xl font-black italic tracking-tighter text-white">SCORE: {{ score }}</div>
                        <div class="text-yellow-400 text-[11px] font-black uppercase tracking-widest mt-0.5">BEST RUN: {{ high }}</div>
                    </div>
                    <button @click="togglePause" class="pointer-events-auto bg-black/30 hover:bg-white/20 text-white p-4 rounded-xl backdrop-blur-md active:scale-90 transition-all border border-white/5 shadow-lg">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                </div>

                <!-- Touch Input Direction Action Buttons -->
                <div v-if="gameState === 'playing'" class="pointer-events-auto flex gap-4 mb-4 ml-4 self-start">
                    <button v-for="dir in ['u','d']" :key="dir" @touchstart.prevent="btn[dir]=true" @touchend.prevent="btn[dir]=false" @mousedown="btn[dir]=true" @mouseup="btn[dir]=false" class="w-20 h-20 rounded-2xl bg-black/30 border border-white/10 flex items-center justify-center active:bg-white/20 active:scale-95 backdrop-blur-md shadow-2xl transition-all select-none">
                        <svg v-if="dir==='u'" class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 15l7-7 7 7"/></svg>
                        <svg v-else class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M19 9l-7 7-7-7"/></svg>
                    </button>
                </div>
            </div>
        </div>
        <script src="config.js"></script>
        <script src="game.js"></script>
        <script src="index.js" defer></script>
    </body>
</html>
