<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avero Mesh Chat</title>
    <script libs="local,tailwind,vue,peer" src="../share/cdn.js"></script>
    <link rel="stylesheet" href="index.css"></link>
</head>
<body class="bg-[#050505] text-white font-sans h-screen overflow-hidden">

    <div id="app" class="flex h-full w-full p-2 md:p-6 gap-2 md:gap-6 relative" v-cloak>

        <button @click="showSidebar = !showSidebar" class="md:hidden absolute top-4 left-4 z-[60] bg-white/10 p-2 rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2"/></svg>
        </button>

        <div :class="['sidebar w-80 flex flex-col gap-4 flex-shrink-0 avero-glass p-6 md:bg-transparent md:border-none md:backdrop-blur-none', showSidebar ? 'open' : '']">

            <div class="avero-glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-1">
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase">Avero Chat</h1>
                    <div v-if="isJoined" class="w-2 h-2 rounded-full bg-emerald-500 status-pulse mt-2"></div>
                </div>
                <div class="h-1 w-10 bg-emerald-500 mb-4"></div>

                <label class="text-[10px] uppercase font-bold opacity-40 tracking-widest">Mesh Room ID</label>
                <div class="mt-2 flex gap-2">
                    <input v-model="roomId" :disabled="isJoined" type="text" placeholder="LOBBY1"
                        class="flex-grow bg-black/40 border border-white/10 rounded-lg p-3 text-xs focus:outline-none focus:border-emerald-500 uppercase font-mono disabled:opacity-50">
                    <button @click="initRoom" v-if="!isJoined"
                        class="bg-white text-black px-4 rounded-lg font-bold text-[10px] uppercase">Join</button>
                </div>
            </div>

            <div class="avero-glass p-6 rounded-2xl flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] uppercase font-bold opacity-40 tracking-widest">Subchats</label>
                    <button @click="createSubchat" class="text-emerald-500 text-[18px] font-bold">+</button>
                </div>
                <div class="flex flex-col gap-1 overflow-y-auto max-h-40">
                    <button v-for="chan in subchats" :key="chan"
                        @click="currentSubchat = chan"
                        :class="['channel-btn w-full text-left p-2 rounded-lg border border-white/5 text-[10px] font-bold uppercase transition-all', currentSubchat === chan ? 'active' : 'hover:bg-white/5']">
                        # {{ chan }}
                    </button>
                </div>
            </div>

            <div class="avero-glass p-6 rounded-2xl">
                <label class="text-[10px] uppercase font-bold opacity-40 tracking-widest">Display Name</label>
                <input v-model="myName" type="text" placeholder="Your Name"
                    class="w-full mt-2 bg-black/40 border border-white/10 rounded-lg p-3 text-xs focus:outline-none focus:border-emerald-500 transition-colors">
            </div>

            <div class="avero-glass p-6 rounded-2xl flex-grow overflow-y-auto flex flex-col">
                <label class="text-[10px] uppercase font-bold opacity-40 tracking-widest mb-3 block text-emerald-500">Active Mesh</label>

                <div class="video-grid mb-4" id="video-area">
                    <div v-if="stream" class="relative rounded-xl overflow-hidden bg-black aspect-video border border-emerald-500/40">
                        <video id="localVideo" :src-object.prop.once="stream" autoplay muted playsinline class="w-full h-full"></video>
                        <div class="absolute bottom-2 left-2 px-2 py-1 bg-emerald-500/80 backdrop-blur-md rounded text-[8px] font-black uppercase tracking-widest text-black">YOU</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 mt-auto">
                    <button @click="toggleVideo" :class="stream ? 'bg-emerald-500 text-black' : 'bg-white/10 text-white'"
                        class="p-3 rounded-xl flex items-center justify-center transition-all hover:scale-105">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2"/></svg>
                    </button>
                    <button @click="isMuted = !isMuted" :class="isMuted ? 'bg-red-500/20 text-red-500' : 'bg-white/10 text-white'"
                        class="p-3 rounded-xl flex items-center justify-center transition-all hover:scale-105">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2"/></svg>
                    </button>
                </div>
            </div>

            <div class="avero-glass p-4 rounded-2xl flex flex-col gap-2">
                <button @click="saveChat" class="w-full p-2 rounded-lg border border-white/10 text-[9px] uppercase font-bold tracking-widest hover:bg-white/5 transition-all">
                    Export Session Logs
                </button>
                <label class="w-full p-2 rounded-lg border border-white/10 text-[9px] uppercase font-bold tracking-widest hover:bg-white/5 transition-all text-center cursor-pointer">
                    Import Logs
                    <input type="file" @change="importLogs" class="hidden" accept=".json">
                </label>
            </div>
        </div>

        <div class="flex-grow avero-glass rounded-3xl flex flex-col overflow-hidden relative">
            <div class="px-8 py-4 bg-white/5 border-b border-white/10 flex justify-between items-center">
                <span class="text-xs font-black uppercase tracking-widest text-emerald-500"># {{ currentSubchat }}</span>
            </div>

            <div id="msg-container" class="flex-grow p-4 md:p-8 overflow-y-auto space-y-6">
                <div v-for="msg in filteredMessages" :key="msg.id" :class="msg.self ? 'items-end' : 'items-start'" class="flex flex-col gap-1">
                    <div class="flex items-center gap-2 px-2">
                        <span class="text-[9px] uppercase font-black tracking-widest" :class="msg.self ? 'text-emerald-500' : 'opacity-40'">{{ msg.sender }}</span>
                        <span class="text-[7px] opacity-20 font-mono">{{ formatTime(msg.time) }}</span>
                    </div>

                    <div v-if="msg.text" :class="msg.self ? 'bg-emerald-600 rounded-tr-none shadow-emerald-900/20' : 'bg-white/10 rounded-tl-none'" class="px-4 py-3 rounded-2xl max-w-[85%] md:max-w-md text-sm border border-white/5 transition-all shadow-xl">
                        {{ msg.text }}
                    </div>

                    <div v-if="msg.image" class="max-w-[80%] rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
                        <img :src="msg.image" class="w-full h-auto block" />
                    </div>
                </div>
            </div>

            <div class="p-4 md:p-6 bg-white/5 border-t border-white/10 flex gap-2 md:gap-4 items-center">
                <label class="cursor-pointer hover:text-emerald-500 transition-colors p-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/></svg>
                    <input type="file" @change="sendImage" class="hidden" accept="image/*">
                </label>

                <input v-model="currentInput" @keyup.enter="sendPayload" type="text"
                    :placeholder="'Message #' + currentSubchat + '...'" :disabled="!isJoined"
                    class="flex-grow bg-transparent border-none text-sm focus:outline-none placeholder:opacity-30">

                <button @click="sendPayload" :disabled="!isJoined || !currentInput"
                    class="bg-emerald-500 text-black w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 active:scale-90 transition-all disabled:opacity-20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="2.5"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="./utils.js"></script>
    <script src="./media.js"></script>
    <script src="./mesh.js"></script>
    <script src="./index.js"></script>
</body>
</html>
