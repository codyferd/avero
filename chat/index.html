<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Pro</title>
    <script libs="local,tailwind,vue,peer" src="../share/cdn.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body class="bg-[#050505] text-white h-screen overflow-hidden">

    <div id="app" v-cloak class="flex flex-col md:flex-row h-full w-full">

        <aside class="md:w-64 w-full p-4 border-b md:border-b-0 md:border-r border-white/10 bg-black flex flex-col gap-4">
            <h1 class="font-black italic text-xl tracking-tighter text-emerald-500">AVERO</h1>

            <div class="space-y-2">
                <input v-model="roomId" :disabled="isJoined" placeholder="Room ID" class="w-full bg-white/5 p-3 rounded-lg text-xs font-mono border border-white/10">
                <button @click="init" class="w-full bg-emerald-500 text-black font-bold py-2 rounded-lg text-sm">CONNECT</button>
            </div>

            <div class="space-y-1">
                <label class="text-[9px] uppercase font-bold opacity-30">Display Name</label>
                <input v-model="username" @change="broadcastUserUpdate" class="w-full bg-white/5 p-2 rounded-lg text-xs">
            </div>

            <div class="flex-grow overflow-y-auto hidden md:block">
                <label class="text-[9px] uppercase font-bold opacity-30">Online</label>
                <div v-for="user in onlineUsers" class="text-xs mt-2 opacity-70">• {{ user }}</div>
            </div>

            <div class="flex flex-col gap-2 border-t border-white/10 pt-4">
                <button @click="exportChat" class="text-[10px] uppercase font-bold opacity-50 hover:opacity-100 transition-opacity">Export Text Only</button>
                <label class="text-[10px] uppercase font-bold opacity-50 hover:opacity-100 cursor-pointer">
                    Import Chat
                    <input type="file" @change="importChat" class="hidden" accept=".json">
                </label>
            </div>
        </aside>

        <main class="flex-grow flex flex-col overflow-hidden bg-[#050505]">

            <div id="msg-container" class="flex-grow overflow-y-auto p-4 md:p-8 space-y-4">
                <div v-for="msg in messages" :key="msg.id" :class="msg.self ? 'text-right' : 'text-left'">
                    <div class="text-[9px] opacity-30 uppercase font-bold mb-1">{{ msg.sender }}</div>
                    <div :class="msg.self ? 'bg-emerald-600' : 'bg-white/10'" class="inline-block p-3 rounded-2xl text-sm max-w-[85%] shadow-lg">
                        <p v-if="msg.text" class="break-words">{{ msg.text }}</p>
                        <img v-if="msg.image" :src="msg.image" class="rounded-lg max-w-full mt-1">
                    </div>
                </div>
            </div>

            <div class="p-4 flex gap-2 items-center bg-black">
                <label class="cursor-pointer p-3 bg-white/5 rounded-full hover:bg-white/10">
                    📷 <input type="file" @change="sendImage" class="hidden" accept="image/*">
                </label>
                <input v-model="input" @keyup.enter="send" class="flex-grow bg-white/5 p-3 rounded-full border border-white/10 focus:outline-none text-sm" placeholder="Message...">
                <button @click="send()" class="bg-emerald-500 text-black px-6 py-3 rounded-full font-bold text-sm">SEND</button>
            </div>
        </main>
    </div>
    <script src="index.js"></script>
</body>
</html>
