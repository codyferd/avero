<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Controls</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body class="bg-[#050505] text-slate-200 font-sans selection:bg-emerald-500/30">
    <div id="app" v-cloak class="min-h-screen p-6 md:p-12 max-w-4xl mx-auto">

        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter uppercase text-white">System</h1>
                <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-[0.3em]">Live Hardware Interface</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-mono text-slate-500 uppercase">Latency: <span class="text-emerald-400">{{ latency }}ms</span></span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-6">
                <!-- Audio Output -->
                <section class="control-card p-6">
                    <div class="flex justify-between mb-4">
                        <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Master Volume</label>
                        <span class="text-xs font-mono text-emerald-400">{{ volume }}%</span>
                    </div>
                    <input type="range" v-model="volume" min="0" max="100" class="avero-slider">
                </section>

                <!-- Battery -->
                <section class="control-card p-6 flex items-center justify-between">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest block mb-1">Energy Cell</label>
                        <span class="text-2xl font-black italic text-white">{{ batteryLevel }}%</span>
                        <span class="text-[9px] uppercase text-slate-500 block">{{ isCharging ? 'AC Power Connected' : 'Discharging' }}</span>
                    </div>
                    <div class="battery-icon" :class="{'charging': isCharging}">
                        <div class="battery-fill" :style="{ width: batteryLevel + '%' }"></div>
                    </div>
                </section>

                <!-- Memory Usage (Chrome/Edge Only) -->
                <section class="control-card p-6">
                    <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest block mb-3">Memory Heap</label>
                    <div class="flex items-end gap-2">
                        <span class="text-2xl font-black italic text-white">{{ memoryUsage }}</span>
                        <span class="text-xs text-slate-500 mb-1">MB Used</span>
                    </div>
                    <div class="w-full bg-white/5 h-1 mt-3 rounded-full overflow-hidden">
                        <div class="bg-emerald-500 h-full transition-all duration-500" :style="{ width: memoryPercent + '%' }"></div>
                    </div>
                </section>
            </div>

            <div class="space-y-6">
                <!-- Connectivity -->
                <section class="control-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <div @click="toggle('notifications')" class="toggle-box flex-1 mr-2" :class="{ 'active': states.notifications }">
                            <div class="text-[8px] font-black uppercase mb-1">Notifications</div>
                            <div class="status-dot"></div>
                        </div>
                        <div class="toggle-box flex-1 ml-2" :class="{ 'active': isOnline }">
                            <div class="text-[8px] font-black uppercase mb-1">Internet</div>
                            <div class="status-dot"></div>
                        </div>
                    </div>

                    <div class="p-4 bg-white/[0.03] rounded-xl border border-white/5">
                        <div class="flex justify-between items-center">
                            <div>
                                <label class="text-[9px] font-black uppercase text-slate-600 block">Connection Type</label>
                                <span class="text-sm font-bold text-white uppercase">{{ connectionType }}</span>
                            </div>
                            <div class="text-right">
                                <label class="text-[9px] font-black uppercase text-slate-600 block">Bandwidth</label>
                                <span class="text-sm font-bold text-emerald-500">{{ downlink }} Mbps</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Clipboard -->
                <section class="control-card p-6">
                    <label class="text-[10px] font-black uppercase text-slate-500 tracking-widest block mb-3">Clipboard Buffer</label>
                    <div class="bg-black/40 rounded-lg p-3 border border-white/5 flex items-center justify-between">
                        <p class="text-xs font-mono truncate mr-4 text-slate-400">{{ clipboardContent || 'Buffer Empty' }}</p>
                        <button @click="readClipboard" class="p-2 hover:bg-white/5 rounded-lg transition-colors">
                            <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
