<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Games</title>
    <script libs="local,tailwind,vue" src="../share/cdn.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div id="app" v-cloak class="min-h-screen bg-slate-950 text-white font-sans">
    <div class="md:hidden flex items-center justify-between p-4 border-b border-white/10 bg-slate-900/50">
        <h1 class="text-xl font-bold tracking-widest">AVERO</h1>
        <button @click="isSidebarOpen = !isSidebarOpen" class="p-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </div>

    <div class="flex h-screen overflow-hidden">
        <aside :class="{'hidden': !isSidebarOpen, 'flex': isSidebarOpen}" class="fixed inset-0 z-50 md:relative md:flex flex-col w-64 bg-slate-900/90 backdrop-blur-xl border-r border-white/10">
            <div class="p-6">
                <input type="text" v-model="search" placeholder="Search games..." class="w-full bg-slate-950 border border-white/10 p-3 rounded-xl focus:border-indigo-500 outline-none transition">
            </div>
            <nav class="flex-1 overflow-y-auto px-4">
                <button v-for="game in filteredGames" :key="game.name" @click="openGame(game); isSidebarOpen=false" class="w-full text-left p-3 rounded-lg hover:bg-indigo-500/20 transition flex items-center space-x-3">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full"></span>
                    <span>{{ game.name }}</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 bg-gradient-to-br from-indigo-950 via-slate-950 to-black">
            <h1 class="text-3xl font-bold mb-8">Avero <span class="text-indigo-400">Games</span></h1>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div v-for="game in filteredGames" :key="game.name" @click="openGame(game)" class="group relative bg-slate-800 rounded-2xl overflow-hidden hover:ring-2 ring-indigo-500 transition-all cursor-pointer">
                    <div class="aspect-video overflow-hidden">
                        <img :src="game.image" :alt="game.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold">{{ game.name }}</h3>
                        <button class="mt-3 w-full py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-bold transition">PLAY NOW</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

    <script src="list.js"></script>
    <script src="index.js"></script>
</body>
</html>
