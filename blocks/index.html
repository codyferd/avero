<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avero Blocks</title>
    <script libs="core,three" src="../share/cdn.js"></script>
</head>
<body class="bg-[#020205] text-white font-sans overflow-hidden select-none touch-none">
    <div id="crosshair"></div>

    <div id="ui" class="absolute top-5 left-5 z-10 pointer-events-none">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">
            Avero <span class="text-indigo-500">Blocks</span>
        </h1>
    </div>

    <div id="hud" class="absolute top-[75px] left-5 flex flex-col gap-2 p-3 bg-black/85 text-white rounded-xl font-mono text-xs border-l-4 border-indigo-500 pointer-events-auto z-[100] min-w-[150px] shadow-2xl backdrop-blur-sm">
        <div id="fps-counter">FPS: 0</div>
        <div id="coords-display" class="text-neutral-300 font-bold tracking-tight">
            X: <span class="text-indigo-400">0</span> Y: <span class="text-indigo-400">0</span> Z: <span class="text-indigo-400">0</span>
        </div>
        <hr class="border-neutral-800">
        
        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold tracking-wider text-neutral-400 uppercase">Block Color</label>
            <div class="flex items-center gap-2">
                <input type="color" id="block-color-picker" value="#6366F1" class="w-8 h-8 bg-transparent border border-neutral-700 rounded cursor-pointer">
                <span id="hex-lbl" class="text-indigo-400 font-bold uppercase text-[11px]">#6366F1</span>
            </div>
        </div>

        <hr class="border-neutral-800">

        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold tracking-wider text-neutral-400 uppercase">Render Dist</label>
            <div class="flex flex-col gap-1">
                <input type="range" id="render-dist-slider" min="2" max="12" step="1" class="w-full h-1 bg-neutral-800 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                <span id="dist-lbl" class="text-indigo-400 font-bold text-[11px]">4 Chunks</span>
            </div>
        </div>
    </div>

    <div id="mobile-overlay">
        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
        </div>

        <div id="action-zone">
            <button id="btn-break" class="action-btn text-red-500">💥<br><span class="label">BREAK</span></button>
            <button id="btn-place" class="action-btn text-green-500">🧱<br><span class="label">PLACE</span></button>
            <button id="btn-jump" class="action-btn text-indigo-400">🦘<br><span class="label">JUMP</span></button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="terrain.js"></script>
    <script src="player.js"></script>
    <script src="index.js"></script>
</body>
</html>
