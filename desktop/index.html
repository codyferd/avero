<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Desktop</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body class="overflow-hidden text-slate-100 font-sans select-none avero-app">

<div id="app" v-cloak class="desktop-container" style="background-image: url('background.avif')">

    <div v-if="isLoading" id="loading-screen">
        <div class="avero-logo-loader">
            <img src="../share/logo.avif" alt="Avero Logo">
        </div>
        <div class="mt-6 text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Avero OS Loading</div>
    </div>

    <div @click="toggleSidebar" class="avero-floating-trigger" title="Open Workspace Menu">
        <img src="../share/logo.avif" alt="Avero Start Logo">
    </div>

    <nav :class="['avero-sidebar-drawer', { open: isSidebarOpen }]">
        
        <div class="drawer-meta-hub">
            <div class="drawer-time-string">{{ currentTime }}</div>
            <div class="drawer-date-string">{{ currentDate }}</div>
            <div class="drawer-version-tag">{{ versionNumber }}</div>
        </div>

        <div class="drawer-header-actions">
            <input 
                type="text" 
                v-model="searchQuery" 
                @keydown.enter="handleSearchSubmit"
                placeholder="Open URL" 
                class="drawer-search-input"
            >
        </div>

        <div v-if="isSplitMenuOpen" class="px-4 py-2 bg-zinc-900/60 border-b border-white/5">
            <p class="text-[8px] font-black opacity-30 uppercase tracking-widest mb-1">Merge with Tab</p>
            <div v-for="d in otherDesktops" :key="d.id"
                 @click="mergeTabs(d.id, activeDesktopId)"
                 class="px-3 py-1.5 hover:bg-white/5 rounded cursor-pointer text-[11px] flex justify-between items-center text-zinc-400 hover:text-white">
                <span>{{ d.name }}</span>
                <span class="opacity-40">+</span>
            </div>
            <div v-if="otherDesktops.length === 0" class="text-[10px] text-zinc-600 italic py-1">No other active tabs available</div>
        </div>

        <div class="drawer-section-title">Active Tabs Matrix</div>
        <div class="drawer-tabs-container">
            <div v-for="(d, index) in desktops" :key="d.id"
                 @click="activeDesktopId = d.id"
                 draggable="true"
                 @dragstart="handleTabDragStart($event, index)"
                 @dragover.prevent="handleTabDragOver($event, index)"
                 @dragleave="handleTabDragLeave($event)"
                 @drop="handleTabDrop($event, index)"
                 :class="['drawer-tab-item', { active: activeDesktopId === d.id, 'is-dragover': dragOverTabIndex === index }]">
                
                <div class="drawer-tab-meta">
                    <span class="drawer-tab-title">{{ d.name }}</span>
                </div>

                <div class="drawer-tab-controls">
                    <button @click.stop="smartRefreshTab(d)" class="drawer-tab-action-btn" title="Refresh Tab Context">🔄</button>
                    <button @click.stop="toggleSplitViewTab(d.id)" class="drawer-tab-action-btn" title="Split Screen Context">🗄️</button>
                    <button @click.stop="closeTabDirect(d.id)" class="drawer-tab-action-btn exit-btn" title="Close Tab">✕</button>
                </div>
            </div>
            <div v-if="desktops.length === 0" class="text-[11px] text-zinc-600 italic px-2">No open instances</div>
        </div>

        <div class="border-b border-white/5 my-2"></div>

        <div class="drawer-section-title">Applications System</div>
        <div class="drawer-apps-list-viewport">
            <div v-for="app in sortedAppList" :key="app.title" 
                 @click="launchNewDesktop(app)" 
                 class="big-app-row">
                <span class="big-app-emoji">{{ app.icon }}</span>
                <span class="big-app-text">{{ app.title }}</span>
            </div>
            <div v-if="sortedAppList.length === 0" class="text-[11px] text-zinc-600 italic px-2">No applications discovered</div>
        </div>
    </nav>

    <main class="main-viewport-content">
        <div v-for="d in desktops"
             :key="'desktop-' + d.id"
             v-show="activeDesktopId === d.id"
             :class="['desktop-grid', 'grid-' + d.apps.length]"
             :style="d.apps.length === 2 ? { gridTemplateColumns: `${d.splitRatio || 50}% ${100 - (d.splitRatio || 50)}%` } : {}">

            <div v-for="(app, index) in d.apps"
                 :key="app.instanceId"
                 class="app-window"
                 :class="{ focused: focusedAppId === app.instanceId }">
                <div v-if="focusedAppId !== app.instanceId"
                     class="focus-overlay"
                     @mousedown="focusedAppId = app.instanceId"></div>
                <div class="flex-1 bg-white relative">
                    <iframe :id="'frame-' + app.instanceId" :src="app.path"></iframe>
                </div>
            </div>

            <div v-if="d.apps.length === 2"
                 class="tile-resizer-bar"
                 :style="{ left: `calc(${d.splitRatio || 50}% - 3px)` }"
                 @mousedown="startTileResize($event, d)">
                 <div class="resizer-knob"></div>
            </div>
        </div>
    </main>
</div>

<script src="list.js"></script>
<script src="index.js"></script>
</body>
</html>
