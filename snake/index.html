<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avero Snake</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body class="bg-[#050505] text-slate-200 font-sans overflow-hidden select-none touch-none">
    <div id="app" v-cloak class="min-h-screen flex flex-col justify-between md:justify-center items-center p-4">

        <!-- Score Metrics Deck -->
        <div class="flex w-full max-w-[600px] justify-between items-center mb-3 px-1">
            <div class="text-left">
                <span class="retro-label">System Score</span>
                <span class="retro-value text-emerald-400 font-mono">{{ score }}</span>
            </div>
            <div class="text-right">
                <span class="retro-label">High Target</span>
                <span class="retro-value text-zinc-500 font-mono">{{ highScore }}</span>
            </div>
        </div>

        <!-- Scaled Grid Matrix Canvas -->
        <div class="relative w-full max-w-[600px] aspect-square bg-white/5 rounded-2xl p-1 game-border" ref="arenaWrapper">
            <canvas ref="snakeCanvas" class="bg-black rounded-xl w-full h-full block"></canvas>

            <!-- Menu Layer Screens -->
            <div v-if="!gameState.running" class="absolute inset-0 flex items-center justify-center bg-black/90 backdrop-blur-md rounded-2xl z-50">
                <div class="text-center px-6">
                    <h2 class="text-4xl md:text-5xl font-black italic tracking-tighter mb-4 uppercase text-white">
                        {{ gameState.gameOver ? 'Matrix Overload' : 'Avero Snake' }}
                    </h2>
                    <p class="text-zinc-500 font-mono text-xs uppercase tracking-widest mb-8 hidden md:block">
                        Controls: WASD or Directional Keys
                    </p>
                    <button @click="startSimulation" class="avero-btn">
                        {{ gameState.gameOver ? 'Re-Initialize' : 'Engage System' }}
                    </button>
                </div>
            </div>
        </div>

        <!-- Virtual Mobile Control Matrix (Hidden on Large Screen Viewports) -->
        <div class="flex flex-col items-center gap-1.5 w-full max-w-[260px] mt-6 md:hidden mb-4 z-40">
            <button @mousedown="sendInput('ArrowUp')" @touchstart.prevent="sendInput('ArrowUp')" class="touch-btn w-16">▲</button>
            <div class="flex gap-1.5 w-full justify-between">
                <button @mousedown="sendInput('ArrowLeft')" @touchstart.prevent="sendInput('ArrowLeft')" class="touch-btn w-16">◀</button>
                <button @mousedown="sendInput('ArrowDown')" @touchstart.prevent="sendInput('ArrowDown')" class="touch-btn w-16">▼</button>
                <button @mousedown="sendInput('ArrowRight')" @touchstart.prevent="sendInput('ArrowRight')" class="touch-btn w-16">▶</button>
            </div>
        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
