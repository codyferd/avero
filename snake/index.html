<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avero Snake</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body class="bg-[#050505] text-slate-200 font-sans overflow-hidden select-none touch-none flex items-center justify-center min-h-screen">
    <div id="app" v-cloak class="h-screen w-screen flex flex-col justify-between items-center p-3 box-border overflow-hidden">

        <div class="flex w-full max-w-[600px] justify-between items-center px-1 py-1 flex-none">
            <div class="text-left">
                <span class="retro-label">System Score</span>
                <span class="retro-value text-emerald-400 font-mono">{{ score }}</span>
            </div>
            <div class="text-right">
                <span class="retro-label">High Target</span>
                <span class="retro-value text-zinc-500 font-mono">{{ highScore }}</span>
            </div>
        </div>

        <div class="flex-1 w-full max-w-[600px] flex items-center justify-center p-1 overflow-hidden">
            <div class="w-full h-full flex justify-center items-center" ref="arenaWrapper">
                <div class="relative game-border p-1 bg-white/5 rounded-2xl box-border flex items-center justify-center">
                    <canvas ref="snakeCanvas" class="bg-black rounded-xl block shadow-inner"></canvas>

                    <div v-if="!gameState.running" class="absolute inset-0 flex items-center justify-center bg-black/90 backdrop-blur-md rounded-2xl z-50">
                        <div class="text-center px-6">
                            <h2 class="text-4xl md:text-5xl font-black italic tracking-tighter mb-4 uppercase text-white">
                                {{ gameState.gameOver ? 'Matrix Overload' : 'Avero Snake' }}
                            </h2>
                            <p class="text-zinc-500 font-mono text-xs uppercase tracking-widest mb-8 hidden md:block">
                                Controls: WASD or Directional Keys
                            </p>
                            <button @click="startSimulation" class="avero-btn text-xs">
                                {{ gameState.gameOver ? 'Re-Initialize' : 'Engage System' }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-1.5 w-full max-w-[260px] mt-2 mb-2 z-40 flex-none md:hidden">
            <button @mousedown="sendInput('ArrowUp')" @touchstart.prevent="sendInput('ArrowUp')" class="touch-btn w-16 py-3">▲</button>
            <div class="flex gap-1.5 w-full justify-between">
                <button @mousedown="sendInput('ArrowLeft')" @touchstart.prevent="sendInput('ArrowLeft')" class="touch-btn w-16 py-3">◀</button>
                <button @mousedown="sendInput('ArrowDown')" @touchstart.prevent="sendInput('ArrowDown')" class="touch-btn w-16 py-3">▼</button>
                <button @mousedown="sendInput('ArrowRight')" @touchstart.prevent="sendInput('ArrowRight')" class="touch-btn w-16 py-3">▶</button>
            </div>
        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
