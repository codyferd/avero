<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AveroScript IDE</title>
    <link rel="stylesheet" href="../../share/theme.css">
    <script src="../../share/cdn.js"></script>
    <script src="app.js"></script>
    <script src="compiler.js"></script>
    <script src="lexer.js"></script>
    <script src="types.js"></script>
    <style>
        [v-cloak] { display: none; }
        body { background: #000; color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; }

        .toolbar {
            height: 50px; background: #08080a; border-bottom: 1px solid #1a1a1a;
            display: flex; align-items: center; padding: 0 20px; gap: 20px;
        }

        .workspace { display: flex; height: calc(100vh - 50px); }
        textarea {
            flex: 1; background: transparent; color: #d4d4d4; border: none;
            padding: 30px; font-size: 15px; outline: none; resize: none;
        }

        /* Floating Windows (Pop-outs) */
        .pop-out {
            position: absolute; right: 20px; bottom: 20px; width: 400px;
            background: #0d0d12; border: 1px solid #333; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 100;
        }
        .pop-header {
            padding: 10px 15px; background: #16161e; font-size: 10px;
            font-weight: bold; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }

        .pop-content { padding: 15px; max-height: 300px; overflow-y: auto; font-size: 12px; }
        pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }

        .btn {
            background: #1a1a1a; color: #888; border: 1px solid #333;
            padding: 6px 12px; border-radius: 6px; font-size: 10px; cursor: pointer;
        }
        .btn-active { color: #fff; border-color: #4f46e5; background: #1e1e2e; }
        .run-btn { background: #4f46e5; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <header class="toolbar">
        <span style="font-weight: 900; letter-spacing: 3px; font-size: 12px;">AVEROSCRIPT</span>
        <button class="btn run-btn" @click="runCode">RUN SYSTEM</button>
        <button class="btn" :class="{'btn-active': showJS}" @click="showJS = !showJS">VIEW JS</button>
        <button class="btn" :class="{'btn-active': showConsole}" @click="showConsole = !showConsole">CONSOLE</button>
    </header>

    <main class="workspace">
        <textarea v-model="source" spellcheck="false" placeholder="print 'Avero OS Ready'"></textarea>
    </main>

    <div v-if="showJS" class="pop-out" style="bottom: 340px;">
        <div class="pop-header">TRANSPILER OUTPUT <button @click="showJS = false">✕</button></div>
        <div class="pop-content">
            <pre style="color: #6366f1">{{ compiled }}</pre>
        </div>
    </div>

    <div v-if="showConsole" class="pop-out">
        <div class="pop-header">SYSTEM CONSOLE <button @click="showConsole = false">✕</button></div>
        <div class="pop-content">
            <div v-for="log in logs" :style="{color: log.error ? '#ff4d4d' : '#4ade80'}">
                > {{ log.text }}
            </div>
            <div v-if="logs.length === 0" style="opacity: 0.2">Waiting for execution...</div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed } = Vue;

createApp({
    setup() {
        const source = ref('print "Hello World"\n\njs\n    let a = 10\n    let b = 20\n    console.log("Sum is:", a + b)');
        const logs = ref([]);
        const showJS = ref(false);
        const showConsole = ref(true);

        const compiled = computed(() => {
            return AveroScript.compile(source.value);
        });

        const runCode = () => {
            logs.value = [];
            const originalLog = console.log;

            // Hook console
            console.log = (...args) => {
                logs.value.push({ text: args.join(' '), error: false });
                originalLog(...args);
            };

            try {
                // Execute
                eval(compiled.value);
            } catch (e) {
                logs.value.push({ text: e.message, error: true });
            }

            // Restore console
            console.log = originalLog;
        };

        return { source, compiled, logs, showJS, showConsole, runCode };
    }
}).mount('#app');
</script>
</body>
</html>
