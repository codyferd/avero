<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Mesh Chat</title>
    <script libs="local,tailwind,vue,peer" src="../../share/cdn.js"></script>
    <style>
        .avero-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #msg-container::-webkit-scrollbar { width: 4px; }
        #msg-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        [v-cloak] { display: none; }

        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans h-screen overflow-hidden">

    <div id="app" class="flex h-full w-full p-6 gap-6" v-cloak>

        <div class="w-80 flex flex-col gap-4">

            <div class="avero-glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-1">
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase">Avero Mesh</h1>
                    <div v-if="isJoined" class="w-2 h-2 rounded-full bg-emerald-500 status-pulse mt-2"></div>
                </div>
                <div class="h-1 w-10 bg-emerald-500 mb-4"></div>

                <label class="text-[10px] uppercase font-bold opacity-40 tracking-widest">Mesh Room ID</label>
                <div class="mt-2 flex gap-2">
                    <input v-model="roomId" :disabled="isJoined" type="text" placeholder="e.g. LOBBY-1"
                        class="flex-grow bg-black/40 border border-white/10 rounded-lg p-3 text-xs focus:outline-none focus:border-emerald-500 uppercase font-mono transition-all disabled:opacity-50">
                    <button @click="initRoom" v-if="!isJoined"
                        class="bg-white text-black px-4 rounded-lg font-bold text-[10px] uppercase hover:scale-105 active:scale-95 transition-all">
                        Join
                    </button>
                </div>
                <p v-if="isJoined" class="text-[9px] mt-2 text-emerald-400 font-bold uppercase tracking-widest">
                    ● {{ isHost ? 'Hosting' : 'Connected to' }} {{ roomId.toUpperCase() }}
                </p>
            </div>

            <div class="avero-glass p-6 rounded-2xl">
                <label class="text-[10px] uppercase font-bold opacity-40 tracking-widest">Display Name</label>
                <input v-model="myName" type="text" placeholder="Enter name..."
                    class="w-full mt-2 bg-black/40 border border-white/10 rounded-lg p-3 text-xs focus:outline-none focus:border-emerald-500 transition-colors">
            </div>

            <div class="avero-glass p-6 rounded-2xl flex-grow flex flex-col">
                <div class="flex-grow">
                    <template v-if="isHost && isJoined">
                        <label class="text-[10px] uppercase font-bold opacity-40 tracking-widest text-emerald-500">Server Tools</label>
                        <div class="mt-3 flex flex-col gap-2">
                            <button @click="exportHostLogs"
                                class="w-full p-2 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[9px] uppercase font-bold tracking-widest hover:bg-emerald-500/20 transition-all">
                                Backup Server Logs
                            </button>

                            <div class="relative w-full">
                                <input type="file" @change="importLogs" id="log-upload" class="hidden" accept=".json">
                                <label for="log-upload"
                                    class="w-full p-2 rounded-lg border border-white/10 text-white/60 text-[9px] uppercase font-bold tracking-widest hover:bg-white/5 transition-all block text-center cursor-pointer">
                                    Inject Existing Logs
                                </label>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="mt-6 pt-6 border-t border-white/10 flex flex-col gap-2">
                    <button @click="saveChat" :disabled="messages.length === 0"
                        class="w-full p-2 rounded-lg border border-white/10 text-[9px] uppercase font-bold tracking-widest hover:bg-white/5 transition-all disabled:opacity-10">
                        Export Session JSON
                    </button>
                </div>
            </div>
        </div>

        <div class="flex-grow avero-glass rounded-3xl flex flex-col overflow-hidden">
            <div id="msg-container" class="flex-grow p-8 overflow-y-auto space-y-6">
                <div v-if="messages.length === 0" class="h-full flex flex-col items-center justify-center opacity-20 italic text-sm text-center">
                    <svg class="w-12 h-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-width="1" /></svg>
                    {{ isJoined ? 'Mesh initialized. Waiting for data...' : 'Establish a Room ID to start a mesh...' }}
                </div>

                <div v-for="msg in messages" :key="msg.id || msg.time"
                    :class="msg.self ? 'items-end' : 'items-start'" class="flex flex-col gap-1">
                    <div class="flex items-center gap-2 px-2">
                        <span class="text-[9px] uppercase font-black tracking-widest" :class="msg.sender === 'SYS' ? 'text-emerald-500/50' : (msg.self ? 'text-emerald-500' : 'opacity-40')">
                            {{ msg.sender }}
                        </span>
                        <span class="text-[7px] opacity-20 font-mono">{{ formatTime(msg.time) }}</span>
                    </div>
                    <div :class="msg.self ? 'bg-emerald-600 text-white rounded-tr-none shadow-emerald-900/20' : 'bg-white/10 text-white rounded-tl-none'"
                        class="px-4 py-3 rounded-2xl max-w-md text-sm shadow-xl border border-white/5 transition-all">
                        {{ msg.text }}
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white/5 border-t border-white/10 flex gap-4 items-center">
                <div class="w-2 h-2 rounded-full" :class="isJoined ? 'bg-emerald-500' : 'bg-red-500'"></div>
                <input v-model="currentInput" @keyup.enter="sendPayload" type="text"
                    :placeholder="isJoined ? 'Broadcast to mesh...' : 'Join a room to chat...'"
                    :disabled="!isJoined"
                    class="flex-grow bg-transparent border-none text-sm focus:outline-none placeholder:opacity-30 disabled:cursor-not-allowed">
                <button @click="sendPayload" :disabled="!isJoined || !currentInput"
                    class="bg-emerald-500 text-black w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 active:scale-90 transition-all disabled:opacity-20 disabled:grayscale">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="2.5"/></svg>
                </button>
            </div>
        </div>

    </div>

    <script src="./app.js"></script>
</body>
</html>
