<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultraraccoon</title>
    <script src="../../share/cdn.js"></script>
</head>
<body class="bg-black text-white h-screen flex items-center justify-center overflow-hidden m-0 p-0 font-sans selection:bg-blue-500">

    <div id="game-menu" class="relative z-50 text-center bg-black border border-zinc-800 p-12 rounded-2xl shadow-[0_0_50px_rgba(0,0,0,1)] transition-all duration-500 transform scale-100">
        <h1 class="mt-0 text-6xl font-black tracking-tighter mb-2 bg-gradient-to-b from-white to-zinc-500 bg-clip-text text-transparent italic">
            ULTRARACCOON
        </h1>
        <p class="text-zinc-500 mb-8 font-medium tracking-widest uppercase text-xs">
            System Ready // Awaiting Input
        </p>
        <button id="start-button" class="group relative px-10 py-4 bg-white text-black font-black text-xl rounded-full transition-all duration-200 transform hover:scale-110 active:scale-90 hover:bg-blue-500 hover:text-white">
            BOOT GAME
        </button>
    </div>

    <div id="game-container" class="absolute inset-0 opacity-0 transition-opacity duration-1000"></div>

    <script src="components.js"></script>
    <script src="utils.js"></script>
    <script src="raccoon.js"></script>
    <script src="level1.js"></script>
    <script src="app.js"></script>

    <script>
        const menu = document.getElementById('game-menu');
        const startBtn = document.getElementById('start-button');
        const gameContainer = document.getElementById('game-container');

        // This flag ensures the game logic doesn't run until true
        let gameActive = false;

        startBtn.addEventListener('click', () => {
            // 1. Visual Transition
            menu.classList.add('opacity-0', 'scale-150', 'pointer-events-none');
            gameContainer.classList.remove('opacity-0');

            // 2. Lock the state
            gameActive = true;

            // 3. Trigger the actual game start logic from your app.js
            // If your app.js has a function like init() or start(), call it here:
            if (typeof initGame === 'function') {
                initGame();
            } else if (typeof game !== 'undefined' && game.start) {
                game.start();
            }

            setTimeout(() => {
                menu.style.display = 'none';
            }, 500);
        });

        // Prevention: Stop event listeners or loops if gameActive is false
        window.addEventListener('keydown', (e) => {
            if (!gameActive) {
                e.preventDefault(); // Stops scrolling/jumping before game starts
                return false;
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (typeof game !== 'undefined' && gameActive) {
                if (document.hidden) game.loop.pause();
                else game.loop.resume();
            }
        });
    </script>
</body>
</html>
