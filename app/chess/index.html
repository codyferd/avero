<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Avero Chess - PvP</title>
        <script libs="local,tailwind,vue,chess,peer" src="../../share/cdn.js"></script>
        <link rel="stylesheet" href="index.css"></link>
<body class="bg-[#050505] text-slate-300 font-sans overflow-hidden">

    <div id="app" v-cloak class="h-screen flex items-center justify-center p-6">

        <div v-if="!gameStarted" class="p-12 text-center max-w-md border-t-2 border-emerald-500/50 bg-white/[0.02] rounded-3xl backdrop-blur-md">
            <h1 class="text-7xl font-black italic tracking-tighter mb-2 text-white uppercase">Chess</h1>
            <p class="text-[9px] uppercase tracking-[0.4em] text-emerald-500 font-bold mb-10">Avero Strategic Mesh</p>

            <div class="space-y-4">
                <button @click="initLocalGame" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs uppercase hover:scale-105 active:scale-95 transition-all shadow-xl">
                    Local PvP Match
                </button>

                <div class="flex items-center gap-4 my-6">
                    <div class="h-[1px] flex-grow bg-white/10"></div>
                    <span class="text-[9px] font-black text-slate-600 uppercase tracking-widest">Online Mesh</span>
                    <div class="h-[1px] flex-grow bg-white/10"></div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                        <input v-model="lobbyId" placeholder="Room Name..."
                               class="w-full bg-transparent border-b border-white/10 p-2 text-center text-white outline-none focus:border-emerald-500 transition-all mb-4 text-sm font-mono">

                        <div class="flex gap-2">
                            <button @click="hostMeshGame" class="flex-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 py-3 rounded-lg font-black text-[10px] uppercase hover:bg-emerald-500 hover:text-black transition-all">
                                Create
                            </button>
                            <button @click="joinMeshGame" class="flex-1 bg-white/5 border border-white/10 text-white py-3 rounded-lg font-black text-[10px] uppercase hover:bg-white/10 transition-all">
                                Join
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <p v-if="meshStatus" class="mt-6 text-[9px] font-mono text-emerald-500 uppercase animate-pulse">{{ meshStatus }}</p>
        </div>

        <div v-else class="grid grid-cols-1 xl:grid-cols-12 gap-8 w-full max-w-[1200px] h-[92vh]">

            <div class="xl:col-span-4 flex flex-col gap-6 overflow-hidden">
                <div class="p-6 bg-white/[0.02] rounded-3xl border border-white/5">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Status</span>
                            <span class="text-[9px] font-mono text-emerald-500 uppercase mt-1">{{ connectionMode }}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full" :class="turn === 'w' ? 'bg-white shadow-[0_0_8px_white]' : 'bg-emerald-500 shadow-[0_0_8px_#10b981]'"></div>
                            <span class="text-[9px] font-mono text-white uppercase">{{ turn === 'w' ? 'White Move' : 'Black Move' }}</span>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-white/[0.02] rounded-3xl border border-white/5 flex-grow flex flex-col overflow-hidden">
                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase mb-3">White Gains</div>
                            <div class="flex flex-wrap gap-1 min-h-[24px]">
                                <img v-for="p in captured.w" :src="getPieceURL({type: p, color: 'b'})" class="w-5 h-5 opacity-40" />
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase mb-3">Black Gains</div>
                            <div class="flex flex-wrap gap-1 min-h-[24px]">
                                <img v-for="p in captured.b" :src="getPieceURL({type: p, color: 'w'})" class="w-5 h-5 opacity-40" />
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-white/5 flex-grow overflow-hidden flex flex-col">
                        <div class="overflow-y-auto pr-2 font-mono text-[11px] space-y-2">
                            <div v-for="(m, i) in moveHistory" :key="i" class="flex gap-4 items-center opacity-80">
                                <span class="w-6 text-slate-700 text-[9px]">{{ Math.floor(i/2) + 1 }}.</span>
                                <span :class="i % 2 === 0 ? 'text-white' : 'text-emerald-400'">{{ m.san }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="xl:col-span-8 flex items-center justify-center relative">
                <div class="eval-bar-container">
                    <div class="eval-fill" :style="{ height: evalScore + '%' }"></div>
                </div>

                <div :class="['board-grid', flipped ? 'rotate-180' : '']">
                    <template v-for="(row, rIdx) in boardState">
                        <div v-for="(square, sIdx) in row"
                             :class="['square', (rIdx + sIdx) % 2 === 0 ? 'light' : 'dark', isSelected(rIdx, sIdx) ? 'selected' : '', isLastMove(rIdx, sIdx) ? 'last-move' : '']"
                             @click="handleSquareClick(rIdx, sIdx)">

                            <span v-if="sIdx === 0" class="coord rank">{{ 8 - rIdx }}</span>
                            <span v-if="rIdx === 7" class="coord file">{{ String.fromCharCode(97 + sIdx) }}</span>

                            <div v-if="isLegalMove(rIdx, sIdx)" class="move-hint"></div>
                            <div v-if="isCaptureMove(rIdx, sIdx)" class="capture-hint"></div>

                            <img v-if="square" :src="getPieceURL(square)" class="piece-img" />
                        </div>
                    </template>
                </div>

                <div class="absolute bottom-4 right-4 flex gap-2">
                    <button @click="flipped = !flipped" class="p-3 bg-white/5 rounded-full border border-white/10 hover:bg-white/10 transition-all shadow-lg group">
                        <svg class="w-4 h-4 text-emerald-500 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="3"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div v-if="gameOverMessage" class="absolute inset-0 z-[100] modal-blur flex items-center justify-center p-6">
            <div class="p-12 text-center max-w-sm bg-[#0a0a0a] border border-white/10 rounded-[2.5rem] shadow-2xl">
                <h2 class="text-3xl font-black italic mb-2 text-white uppercase tracking-tighter">Match End</h2>
                <p class="text-slate-500 text-[10px] uppercase tracking-widest mb-8">{{ gameOverMessage }}</p>
                <button @click="resetGame" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black text-sm uppercase hover:bg-emerald-400 transition-all">
                    Return to Lobby
                </button>
            </div>
        </div>
    </div>

    <input
        v-model="lobbyId"
        @input="formatLobbyId"
        placeholder="Room Name..."
        class="w-full bg-transparent border-b border-white/10 p-2 text-center text-white outline-none focus:border-emerald-500 transition-all mb-4 text-sm font-mono"
    >

    <script src="mesh.js"></script>
    <script src="index.js"></script>
</body>

</html>
