<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Avero Chess - PvP</title>
        <script libs="local,tailwind,vue,chess" src="../../share/cdn.js"></script>
        <style>
            :root {
                --board-light: #ebecd0;
                --board-dark: #779556;
                --avero-emerald: #10b981;
            }

            [v-cloak] { display: none; }

            .board-grid {
                display: grid;
                grid-template-columns: repeat(8, 1fr);
                grid-template-rows: repeat(8, 1fr);
                aspect-ratio: 1/1;
                width: min(70vh, 520px);
                border: 8px solid #0f172a;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .rotate-180 { transform: rotate(180deg); }

            .square { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; }
            .square.light { background: var(--board-light); }
            .square.dark { background: var(--board-dark); }
            .square.selected { background: rgba(16, 185, 129, 0.6) !important; }
            .square.last-move { background: rgba(255, 255, 0, 0.2) !important; }

            .eval-bar-container {
                width: 12px;
                height: min(70vh, 520px);
                background: #1e293b;
                border-radius: 6px;
                overflow: hidden;
                margin-right: 24px;
                display: flex;
                flex-direction: column-reverse;
            }
            .eval-fill {
                background: #f8fafc;
                transition: height 0.6s ease;
                width: 100%;
            }

            .move-hint { width: 24%; height: 24%; background: rgba(0,0,0,0.15); border-radius: 50%; pointer-events: none; }
            .capture-hint { position: absolute; width: 85%; height: 85%; border: 5px solid rgba(0,0,0,0.08); border-radius: 50%; pointer-events: none; }

            .piece-img {
                width: 90%; height: 90%;
                z-index: 10; pointer-events: none;
                filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
            }

            .rotate-180 .piece-img { transform: rotate(-180deg); }
            .coord { position: absolute; font-size: 8px; font-weight: 900; opacity: 0.3; pointer-events: none; color: #000; }
            .rank { left: 3px; top: 3px; }
            .file { right: 3px; bottom: 3px; }

            .modal-blur { backdrop-filter: blur(20px); background: rgba(2, 6, 23, 0.85); }
        </style>
    </head>
    <body class="bg-[#050505] text-slate-300 font-sans overflow-hidden">

        <div id="app" v-cloak class="h-screen flex items-center justify-center p-6">

            <div v-if="!gameStarted" class="p-12 text-center max-w-md border-t-2 border-emerald-500/50 bg-white/[0.02] rounded-3xl">
                <h1 class="text-7xl font-black italic tracking-tighter mb-2 text-white">CHESS</h1>
                <p class="text-[9px] uppercase tracking-[0.4em] text-emerald-500 font-bold mb-10 text-center">Local Multi-Player</p>

                <button @click="initGame" class="w-full bg-white text-black py-4 rounded-xl font-black text-xs uppercase hover:scale-105 active:scale-95 transition-all shadow-xl">
                    Start PvP Match
                </button>
            </div>

            <div v-else class="grid grid-cols-1 xl:grid-cols-12 gap-8 w-full max-w-[1200px] h-[92vh]">

                <div class="xl:col-span-4 flex flex-col gap-6 overflow-hidden">
                    <div class="p-6 bg-white/[0.02] rounded-3xl border border-white/5">
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Status</span>
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full" :class="turn === 'w' ? 'bg-white shadow-[0_0_8px_white]' : 'bg-emerald-500 shadow-[0_0_8px_#10b981]'"></div>
                                <span class="text-[9px] font-mono text-white uppercase">{{ turn === 'w' ? 'White to move' : 'Black to move' }}</span>
                            </div>
                        </div>
                    </div>

                    <div class="p-6 bg-white/[0.02] rounded-3xl border border-white/5 flex-grow flex flex-col overflow-hidden">
                        <div class="space-y-6">
                            <div>
                                <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase mb-3">White Gains</div>
                                <div class="flex flex-wrap gap-1 min-h-[24px]">
                                    <img v-for="p in captured.w" :src="getPieceURL({type: p, color: 'b'})" class="w-5 h-5 opacity-40" />
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] font-black text-slate-500 uppercase mb-3">Black Gains</div>
                                <div class="flex flex-wrap gap-1 min-h-[24px]">
                                    <img v-for="p in captured.b" :src="getPieceURL({type: p, color: 'w'})" class="w-5 h-5 opacity-40" />
                                </div>
                            </div>
                        </div>

                        <div class="mt-8 pt-6 border-t border-white/5 flex-grow overflow-hidden flex flex-col">
                            <div class="overflow-y-auto pr-2 font-mono text-[11px] space-y-2">
                                <div v-for="(m, i) in moveHistory" :key="i" class="flex gap-4 items-center opacity-80">
                                    <span class="w-6 text-slate-700 text-[9px]">{{ Math.floor(i/2) + 1 }}.</span>
                                    <span :class="i % 2 === 0 ? 'text-white' : 'text-emerald-400'">{{ m.san }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="xl:col-span-8 flex items-center justify-center relative">
                    <div class="eval-bar-container">
                        <div class="eval-fill" :style="{ height: evalScore + '%' }"></div>
                    </div>

                    <div :class="['board-grid', flipped ? 'rotate-180' : '']">
                        <template v-for="(row, rIdx) in boardState">
                            <div v-for="(square, sIdx) in row"
                                 :class="['square', (rIdx + sIdx) % 2 === 0 ? 'light' : 'dark', isSelected(rIdx, sIdx) ? 'selected' : '', isLastMove(rIdx, sIdx) ? 'last-move' : '']"
                                 @click="handleSquareClick(rIdx, sIdx)">

                                <span v-if="sIdx === 0" class="coord rank">{{ 8 - rIdx }}</span>
                                <span v-if="rIdx === 7" class="coord file">{{ String.fromCharCode(97 + sIdx) }}</span>

                                <div v-if="isLegalMove(rIdx, sIdx)" class="move-hint"></div>
                                <div v-if="isCaptureMove(rIdx, sIdx)" class="capture-hint"></div>

                                <img v-if="square" :src="getPieceURL(square)" class="piece-img" />
                            </div>
                        </template>
                    </div>

                    <button @click="flipped = !flipped" class="absolute bottom-4 right-4 p-3 bg-white/5 rounded-full border border-white/10 hover:bg-white/10 transition-all shadow-lg">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="3"/></svg>
                    </button>
                </div>
            </div>

            <div v-if="gameOverMessage" class="absolute inset-0 z-[100] modal-blur flex items-center justify-center p-6">
                <div class="p-12 text-center max-w-sm bg-[#0a0a0a] border border-white/10 rounded-[2.5rem] shadow-2xl">
                    <h2 class="text-3xl font-black italic mb-2 text-white uppercase tracking-tighter">Match End</h2>
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest mb-8">{{ gameOverMessage }}</p>
                    <button @click="initGame" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black text-sm uppercase hover:bg-emerald-400 transition-all">
                        Reset Buffer
                    </button>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
