<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Desktop</title>
    <script libs="local,tailwind,vue" src="../../share/cdn.js"></script>
    <style>
        [v-cloak] { display: none; }
        body { background: #000; margin: 0; }

        .ui-solid { background: #000000; border-bottom: 1px solid rgba(255,255,255,0.1); }

        #loading-screen {
            position: fixed; inset: 0; background: #000000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }

        .avero-logo-loader {
            width: 80px; height: 80px; background: #000000; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.2);
            animation: pulse 2s infinite ease-in-out;
            overflow: hidden; padding: 12px; box-sizing: border-box;
        }

        .avero-logo-loader img, .start-logo-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

        .avero-start-btn {
            background: #000000 !important; border: 1px solid rgba(255,255,255,0.1) !important;
            display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 4px !important;
        }
        .avero-start-btn:hover { border-color: var(--avero-accent) !important; box-shadow: 0 0 15px rgba(79, 70, 229, 0.3); }

        .sub-bar {
            height: 48px; background: #000000; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 12px; z-index: 90; padding: 0 16px;
        }

        .functions-scroll {
            display: flex; gap: 8px; overflow-x: auto; flex: 1; padding: 4px 0;
            scrollbar-width: 1px;
        }
        .functions-scroll::-webkit-scrollbar { display: none; }

        .mini-app-card {
            flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
            padding: 4px 12px; background: #111; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .mini-app-card:hover { border-color: var(--avero-accent); }

        .hypr-tab {
            height: 28px; padding: 0 12px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: all 0.3s;
            background: rgba(255, 255, 255, 0.03); margin: 0 4px;
        }
        .hypr-tab.active { border-color: var(--avero-accent); background: rgba(99, 102, 241, 0.15); }

        .desktop-grid { display: grid; gap: 6px; height: 100%; width: 100%; background: #000000; padding: 6px; box-sizing: border-box; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-3 > :first-child { grid-row: span 2; }

        .app-window { display: flex; flex-direction: column; background: #000; overflow: hidden; border-radius: 12px; border: 2px solid rgba(255,255,255,0.05); position: relative; }
        .app-window.focused { border-color: var(--avero-accent); }

        .focus-overlay { position: absolute; inset: 0; z-index: 50; cursor: pointer; }
        iframe { background: #fff; width: 100%; height: 100%; border: none; }

        .action-icon {
            opacity: 0.6; transition: all 0.2s; cursor: pointer;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        }
        .action-icon:hover { opacity: 1; border-color: var(--avero-accent); }

        .search-dropdown {
            position: absolute; top: 52px; left: 16px; width: 280px;
            background: #111; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000;
        }

        .search-small {
            color: black
        }
    </style>
</head>
<body class="overflow-hidden text-slate-100 font-sans select-none avero-app">

<div id="app" v-cloak class="h-screen w-screen flex flex-col relative bg-cover bg-center" style="background-image: url('background.avif')">

    <div v-if="isLoading" id="loading-screen">
        <div class="avero-logo-loader">
            <img src="../../share/logo.avif" alt="Avero Logo">
        </div>
        <div class="mt-6 text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Avero OS Loading</div>
    </div>

    <header class="h-12 ui-solid flex items-center px-4 z-[100] gap-4 shadow-xl">
        <button @click="isDrawerOpen = !isDrawerOpen" class="avero-btn avero-start-btn h-8 w-8 !rounded-lg">
            <img src="../../share/logo.avif" class="start-logo-img" alt="Start">
        </button>

        <div class="flex flex-1 items-center overflow-x-auto no-scrollbar h-full">
            <div v-for="d in desktops" :key="d.id"
                 @click="activeDesktopId = d.id"
                 class="hypr-tab"
                 :class="{ active: activeDesktopId === d.id }">
                <span class="text-[9px] font-black uppercase tracking-[0.15em] whitespace-nowrap">{{ d.name }}</span>
            </div>
        </div>

        <div class="flex flex-col items-end leading-tight pr-2">
            <div class="text-[11px] font-black text-white">{{ currentTime }}</div>
            <div class="text-[8px] font-bold opacity-30 uppercase tracking-widest">{{ currentDate }}</div>
        </div>
    </header>

    <transition name="slide-down">
        <nav v-if="isDrawerOpen" class="sub-bar">
            <div v-if="activeDesktopId" class="flex items-center gap-2 border-r border-white/10 pr-4 relative">
                <button @click="smartClose" class="action-icon text-sm text-red-400" title="Close">✕</button>
                <button @click="smartRefresh" class="action-icon text-sm" title="Refresh">🔄</button>
                <button @click="isSplitMenuOpen = !isSplitMenuOpen" class="action-icon text-sm" title="Split View">🗄️</button>

                <div v-if="isSplitMenuOpen" class="absolute top-12 left-0 w-48 bg-[#111] border border-white/10 rounded-lg shadow-2xl py-2 z-[1100]">
                    <p class="px-3 py-1 text-[8px] font-black opacity-30 uppercase tracking-widest">Merge with Tab</p>
                    <div v-for="d in otherDesktops" :key="d.id"
                         @click="mergeTabs(d.id, activeDesktopId)"
                         class="px-3 py-2 hover:bg-white/5 cursor-pointer text-[10px] flex justify-between items-center">
                        <span>{{ d.name }}</span>
                        <span class="opacity-40">+</span>
                    </div>
                </div>
            </div>

            <button @click="isSearchOpen = !isSearchOpen" class="action-icon text-xs font-bold" title="Search">🔍</button>

            <div v-if="isSearchOpen" class="search-dropdown-container">
                <div class="search-dropdown">
                    <input
                        v-model="urlInput"
                        @keyup.enter="launchUrl"
                        @keyup.esc="isSearchOpen = false"
                        class="search-small"
                        placeholder="URL or Search..."
                        autofocus
                    >

                    <button @click="isSearchOpen = false" class="close-btn" title="Close">
                        &times;
                    </button>
                </div>
            </div>


            <div class="functions-scroll no-scrollbar">
                <div v-for="app in appList" :key="app.id" @click="launchNewDesktop(app)" class="mini-app-card">
                    <span class="text-sm">{{ app.icon }}</span>
                    <span class="text-[9px] font-black uppercase whitespace-nowrap">{{ app.title }}</span>
                </div>
            </div>
        </nav>
    </transition>

    <main class="flex-1 relative overflow-hidden bg-black/20">
        <div v-for="d in desktops"
             :key="'desktop-' + d.id"
             v-show="activeDesktopId === d.id"
             :class="['desktop-grid', 'grid-' + d.apps.length]">

            <div v-for="app in d.apps"
                 :key="app.instanceId"
                 class="app-window"
                 :class="{ focused: focusedAppId === app.instanceId }">
                <div v-if="focusedAppId !== app.instanceId"
                     class="focus-overlay"
                     @mousedown="focusedAppId = app.instanceId"></div>
                <div class="flex-1 bg-white relative">
                    <iframe :id="'frame-' + app.instanceId" :src="app.path"></iframe>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="list.js"></script>
<script src="app.js"></script>
</body>
</html>
