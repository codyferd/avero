<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Desktop</title>
    <link rel="stylesheet" href="../../share/theme.css">
    <script src="proxy.js"></script>
    <script src="../../share/cdn.js"></script>
    <style>
        [v-cloak] { display: none; }
        body { background: #000; margin: 0; }

        .ui-solid { background: #000000; border-bottom: 1px solid var(--avero-border); }

        #loading-screen {
            position: fixed; inset: 0; background: #000000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }

        .avero-logo-loader {
            width: 80px; height: 80px; background: #000000; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.2);
            animation: pulse 2s infinite ease-in-out;
            overflow: hidden; padding: 12px; box-sizing: border-box;
        }

        .avero-logo-loader img, .start-logo-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

        .avero-start-btn {
            background: #000000 !important; border: 1px solid rgba(255,255,255,0.1) !important;
            display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 4px !important;
        }
        .avero-start-btn:hover { border-color: var(--avero-accent) !important; box-shadow: 0 0 15px rgba(79, 70, 229, 0.3); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .desktop-grid { display: grid; gap: 2px; height: 100%; width: 100%; background: #1a1a20; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-3 > :first-child { grid-row: span 2; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .app-window { display: flex; flex-direction: column; background: #000; overflow: hidden; }
        iframe { background: #fff; width: 100%; height: 100%; border: none; }

        .nav-btn { padding: 2px 6px; border-radius: 4px; font-size: 10px; background: #222; border: 1px solid #333; color: #aaa; cursor: pointer; }
        .nav-btn:hover { background: var(--avero-accent); color: white; }

        .tab-drop-zone { background: var(--avero-accent-glow) !important; border-bottom: 2px solid var(--avero-accent) !important; }
        .search-small { background: #16161e; border: 1px solid #2d2d3d; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: white; width: 100%; outline: none; transition: border-color 0.2s; }
        .search-small:focus { border-color: #6366f1; }
    </style>
</head>
<body class="overflow-hidden text-slate-100 font-sans select-none avero-app">

<div id="app" v-cloak class="h-screen w-screen flex flex-col relative bg-cover bg-center" style="background-image: url('background.avif')">

    <div v-if="isLoading" id="loading-screen">
        <div class="avero-logo-loader">
            <img src="../../share/logo.avif" alt="Avero Logo">
        </div>
        <div class="mt-6 text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Avero OS Loading</div>
    </div>

    <header class="h-12 ui-solid flex items-center px-4 z-[100] gap-4 shadow-xl">
        <button @click="isDrawerOpen = !isDrawerOpen" class="avero-btn avero-start-btn h-8 w-8 !rounded-lg">
            <img src="../../share/logo.avif" class="start-logo-img" alt="Start">
        </button>

        <div class="flex flex-1 overflow-x-auto no-scrollbar h-full">
            <div v-for="d in desktops" :key="d.id"
                 draggable="true"
                 @dragstart="draggedTabId = d.id"
                 @dragover.prevent="dragOverId = d.id"
                 @dragleave="dragOverId = null"
                 @drop="mergeTabs(d.id)"
                 @click="activeDesktopId = d.id"
                 class="h-full px-5 flex items-center gap-3 cursor-pointer transition-all border-r border-white/5"
                 :class="[
                    activeDesktopId === d.id ? 'bg-[#16161e] text-white border-b-2 border-b-indigo-500' : 'text-slate-500 hover:bg-white/5',
                    dragOverId === d.id ? 'tab-drop-zone' : ''
                 ]">
                <span class="text-[9px] font-black uppercase tracking-[0.2em]">{{ d.name }}</span>
                <button @click.stop="closeDesktop(d.id)" class="hover:text-red-400 text-xs opacity-40">✕</button>
            </div>
        </div>

        <div class="flex flex-col items-end leading-tight pr-2">
            <div class="text-[11px] font-black text-white">{{ currentTime }}</div>
            <div class="text-[8px] font-bold opacity-30 uppercase tracking-widest">{{ currentDate }}</div>
        </div>
    </header>

    <transition name="fade">
        <div v-if="isDrawerOpen" class="absolute top-12 left-0 w-72 h-[calc(100vh-3.1rem)] ui-solid p-5 z-[1000] shadow-2xl border-r">
            <div class="mb-4">
                <p class="text-[8px] font-black text-zinc-600 uppercase tracking-widest mb-2">Direct / Web Search</p>
                <input v-model="urlInput" @keyup.enter="launchUrl" class="search-small" placeholder="URL or Search...">
            </div>

            <div class="mb-6">
                <p class="text-[8px] font-black text-indigo-500 uppercase tracking-widest mb-2">Avero Proxy Linker</p>
                <input v-model="proxyInput" @keyup.enter="launchProxyUrl" class="search-small !border-indigo-900/50" placeholder="Proxy Search...">
                <p class="text-[7px] text-zinc-700 mt-2 italic">Submitting again cycles through blocked proxies.</p>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div v-for="app in appList" :key="app.id" @click="launchNewDesktop(app)"
                     class="avero-card flex flex-col items-center gap-2 p-3 cursor-pointer transition-all hover:bg-[#1a1a24] !rounded-xl !bg-[#111] border border-white/5">
                    <span class="text-2xl">{{ app.icon }}</span>
                    <span class="text-[9px] font-bold uppercase">{{ app.title }}</span>
                </div>
            </div>
        </div>
    </transition>

    <main class="flex-1 relative overflow-hidden">
        <div v-if="activeDesktop" :class="['desktop-grid', 'grid-' + activeDesktop.apps.length]">
            <div v-for="app in activeDesktop.apps" :key="app.instanceId" class="app-window">
                <div class="h-9 flex items-center justify-between px-2 bg-[#0d0d12] border-b border-white/10">
                    <div class="flex items-center gap-1">
                        <button @click="navAction(app.instanceId, 'back')" class="nav-btn">◀</button>
                        <button @click="navAction(app.instanceId, 'forward')" class="nav-btn">▶</button>
                        <button @click="navAction(app.instanceId, 'reload')" class="nav-btn">🔄</button>
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-2">{{ app.title }}</span>
                    </div>
                    <button @click="closeApp(app.instanceId)" class="text-slate-600 hover:text-red-500 px-2">✕</button>
                </div>
                <div class="flex-1 bg-white">
                    <iframe
                        :id="'frame-' + app.instanceId"
                        :src="app.path"
                        sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-same-origin">
                    </iframe>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
