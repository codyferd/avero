<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Desktop</title>
    <script src="../../share/cdn.js"></script>
    <style>
        [v-cloak] { display: none; }
        body { background: #000; margin: 0; }

        .ui-solid { background: #000000; border-bottom: 1px solid var(--avero-border); }

        #loading-screen {
            position: fixed; inset: 0; background: #000000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }

        .avero-logo-loader {
            width: 80px; height: 80px; background: #000000; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(79, 70, 229, 0.2);
            animation: pulse 2s infinite ease-in-out;
            overflow: hidden; padding: 12px; box-sizing: border-box;
        }

        .avero-logo-loader img, .start-logo-img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

        .avero-start-btn {
            background: #000000 !important; border: 1px solid rgba(255,255,255,0.1) !important;
            display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 4px !important;
        }
        .avero-start-btn:hover { border-color: var(--avero-accent) !important; box-shadow: 0 0 15px rgba(79, 70, 229, 0.3); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .hypr-tab {
            height: 28px; padding: 0 12px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.03); margin: 0 4px; position: relative;
        }
        .hypr-tab:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.3); }

        .hypr-tab.active {
            border-color: var(--avero-accent);
            background: rgba(99, 102, 241, 0.15);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4), inset 0 0 5px rgba(99, 102, 241, 0.2);
            animation: border-glow 2s infinite alternate;
        }

        @keyframes border-glow {
            from { box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
            to { box-shadow: 0 0 20px rgba(99, 102, 241, 0.6); }
        }

        .desktop-grid { display: grid; gap: 6px; height: 100%; width: 100%; background: #000000; padding: 6px; box-sizing: border-box; }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .grid-3 > :first-child { grid-row: span 2; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .app-window { display: flex; flex-direction: column; background: #000; overflow: hidden; border-radius: 12px; border: 2px solid rgba(255,255,255,0.05); transition: all 0.2s ease; position: relative; }
        .app-window.focused { border-color: var(--avero-accent); box-shadow: 0 0 20px rgba(99, 102, 241, 0.15); }

        /* The click-catcher overlay */
        .focus-overlay { position: absolute; inset: 0; z-index: 50; cursor: pointer; }

        iframe { background: #fff; width: 100%; height: 100%; border: none; pointer-events: auto; }

        .action-icon {
            opacity: 0.4; transition: all 0.2s; cursor: pointer;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .action-icon:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        .icon-close:hover { color: #ef4444; }
        .icon-refresh:hover { color: var(--avero-accent); transform: rotate(15deg); }

        .search-small { background: #16161e; border: 1px solid #2d2d3d; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: white; width: 100%; outline: none; }
    </style>
</head>
<body class="overflow-hidden text-slate-100 font-sans select-none avero-app">

<div id="app" v-cloak class="h-screen w-screen flex flex-col relative bg-cover bg-center" style="background-image: url('background.avif')">

    <div v-if="isLoading" id="loading-screen">
        <div class="avero-logo-loader">
            <img src="../../share/logo.avif" alt="Avero Logo">
        </div>
        <div class="mt-6 text-[10px] font-black uppercase tracking-[0.3em] opacity-40">Avero OS Loading</div>
    </div>

    <header class="h-12 ui-solid flex items-center px-4 z-[100] gap-4 shadow-xl">
    <button @click="isDrawerOpen = !isDrawerOpen" class="avero-btn avero-start-btn h-8 w-8 !rounded-lg">
        <img src="../../share/logo.avif" class="start-logo-img" alt="Start">
    </button>

    <div class="flex flex-1 items-center overflow-x-auto no-scrollbar h-full">
        <div v-for="d in desktops" :key="d.id"
             @click="activeDesktopId = d.id"
             class="hypr-tab"
             :class="{ active: activeDesktopId === d.id }">
            <span class="text-[9px] font-black uppercase tracking-[0.15em] whitespace-nowrap">{{ d.name }}</span>
        </div>
    </div>

    <div v-if="activeDesktopId" class="flex items-center gap-1 mr-2 relative">
        <button @click="smartClose" class="action-icon icon-close text-lg" title="Close Selected">✕</button>
        <button @click="smartRefresh" class="action-icon icon-refresh text-sm" title="Refresh Selected">🔄</button>

        <button @click="isSplitMenuOpen = !isSplitMenuOpen" class="action-icon text-sm" title="Split View">🗄️</button>

        <div v-if="isSplitMenuOpen" class="absolute top-10 right-0 w-48 bg-[#111] border border-white/10 rounded-lg shadow-2xl py-2 z-[1100]">
            <p class="px-3 py-1 text-[8px] font-black opacity-30 uppercase tracking-widest">Merge with Tab</p>
            <div v-for="d in otherDesktops" :key="d.id"
                 @click="mergeTabs(d.id, activeDesktopId)"
                 class="px-3 py-2 hover:bg-white/5 cursor-pointer text-[10px] flex justify-between items-center">
                <span>{{ d.name }}</span>
                <span class="opacity-40">+</span>
            </div>
            <div v-if="otherDesktops.length === 0" class="px-3 py-2 text-[10px] opacity-40 italic">No other tabs open</div>
        </div>
    </div>

    <div class="flex flex-col items-end leading-tight pr-2">
        <div class="text-[11px] font-black text-white">{{ currentTime }}</div>
        <div class="text-[8px] font-bold opacity-30 uppercase tracking-widest">{{ currentDate }}</div>
    </div>
</header>


    <transition name="fade">
        <div v-if="isDrawerOpen" class="app-drawer absolute top-12 left-0 w-72 h-[calc(100vh-3.1rem)] ui-solid p-5 z-[1000] shadow-2xl border-r">
            <div class="mb-6">
                <input v-model="urlInput" @keyup.enter="launchUrl" class="search-small" placeholder="URL or Search...">
            </div>
            <div class="grid grid-cols-2 gap-2 pb-10">
                <div v-for="app in appList" :key="app.id" @click="launchNewDesktop(app)"
                     class="avero-card flex flex-col items-center gap-2 p-3 cursor-pointer transition-all hover:bg-[#1a1a24] !rounded-xl !bg-[#111] border border-white/5">
                    <span class="text-2xl">{{ app.icon }}</span>
                    <span class="text-[9px] font-bold uppercase">{{ app.title }}</span>
                </div>
            </div>
        </div>
    </transition>

    <main class="flex-1 relative overflow-hidden bg-black/20">
        <div v-for="d in desktops"
             :key="'desktop-' + d.id"
             v-show="activeDesktopId === d.id"
             :class="['desktop-grid', 'grid-' + d.apps.length]">

            <div v-for="app in d.apps"
                 :key="app.instanceId"
                 class="app-window"
                 :class="{ focused: focusedAppId === app.instanceId }">

                <div v-if="focusedAppId !== app.instanceId"
                     class="focus-overlay"
                     @mousedown="focusedAppId = app.instanceId"></div>

                <div class="flex-1 bg-white relative">
                    <iframe
                        :id="'frame-' + app.instanceId"
                        :src="app.path"
                        sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-downloads">
                    </iframe>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="list.js"></script>
<script src="app.js"></script>
</body>
</html>
