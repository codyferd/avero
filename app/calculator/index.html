<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Calculator</title>
    <script libs="tailwind,vue,math" src="../../share/cdn.js"></script>
    <link rel="stylesheet" href="index.css"></link>
</head>
<body class="bg-[#020617] text-slate-300 p-4 md:p-8 font-sans">
    <div id="app" v-cloak class="max-w-5xl mx-auto">

        <div class="flex justify-between items-center border-b border-slate-800 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">Avero <span class="text-indigo-500">Calculator</span></h1>
            </div>
            <div class="flex gap-4">
                <button @click="activeTab = 'math'" :class="activeTab === 'math' ? 'text-indigo-400 border-indigo-400' : 'text-slate-600 border-transparent'" class="text-[10px] font-bold border-b-2 pb-1 transition-all">MATH</button>
                <button @click="activeTab = 'trig'" :class="activeTab === 'trig' ? 'text-indigo-400 border-indigo-400' : 'text-slate-600 border-transparent'" class="text-[10px] font-bold border-b-2 pb-1 transition-all">TRIG</button>
                <button @click="activeTab = 'prob'" :class="activeTab === 'prob' ? 'text-indigo-400 border-indigo-400' : 'text-slate-600 border-transparent'" class="text-[10px] font-bold border-b-2 pb-1 transition-all">PROB</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 order-2 lg:order-1">
                <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 h-[550px] flex flex-col">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Data_Log
                    </span>
                    <div class="overflow-y-auto flex-grow space-y-4 custom-scrollbar">
                        <div v-for="h in history" @click="input = h.res" class="group cursor-pointer border-l-2 border-transparent hover:border-indigo-500 pl-3 transition-all">
                            <div class="text-[10px] text-slate-600 truncate group-hover:text-slate-400">{{ h.exp }}</div>
                            <div class="text-sm font-mono text-emerald-500 font-bold group-hover:text-emerald-400"> {{ h.res }}</div>
                        </div>
                        <div v-if="history.length === 0" class="text-[10px] text-slate-700 italic">No entries in current session...</div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9 order-1 lg:order-2 space-y-6">
                <div class="bg-slate-900/80 border border-slate-800 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <input
                            v-model="input"
                            @keyup.enter="exec"
                            ref="term"
                            class="w-full text-6xl avero-input p-2 mb-2 font-light"
                            placeholder="0"
                        >
                        <div class="flex justify-between items-center mt-2">
                            <div class="text-xs text-slate-500 font-mono italic">{{ formula || 'awaiting_input...' }}</div>
                            <div class="text-[10px] text-indigo-400 font-bold uppercase tracking-tighter">Deg/Rad Mode: Auto</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 md:grid-cols-6 gap-2 mt-10">
                        <div class="contents" v-if="activeTab === 'math'">
                            <button v-for="f in ['sqrt','log','log10','abs','ceil','floor','min','max','cbrt','sign','exp','mod']" @click="add(f+'(')" class="func-btn py-3 rounded-lg">{{f}}</button>
                        </div>

                        <div class="contents" v-if="activeTab === 'trig'">
                            <button v-for="f in ['sin','cos','tan','asin','acos','atan','sinh','cosh','tanh','sec','cot','csc']" @click="add(f+'(')" class="func-btn py-3 rounded-lg">{{f}}</button>
                        </div>

                        <div class="contents" v-if="activeTab === 'prob'">
                            <button v-for="f in ['factorial','permutations','combinations','random','gamma','erf']" @click="add(f+'(')" class="func-btn py-3 rounded-lg">{{f}}</button>
                            <button @click="add('pi')" class="func-btn py-3 rounded-lg">π</button>
                            <button @click="add('e')" class="func-btn py-3 rounded-lg">e</button>
                        </div>

                        <button @click="add('(')" class="func-btn op-btn rounded-lg">(</button>
                        <button @click="add(')')" class="func-btn op-btn rounded-lg">)</button>
                        <button @click="add('^')" class="func-btn op-btn rounded-lg">xʸ</button>
                        <button @click="input = ''" class="func-btn text-rose-500 border-rose-900/30 rounded-lg">AC</button>

                        <button @click="exec" class="col-span-4 md:col-span-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-black tracking-widest py-4 rounded-xl shadow-lg shadow-indigo-900/20 transition-all uppercase mt-2">
                            Run Command
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div v-for="(val, key) in constants" @click="add(key)" class="bg-slate-900/40 border border-slate-800 p-3 rounded-xl cursor-pointer hover:border-indigo-500 transition-all group">
                        <div class="text-[9px] text-slate-500 uppercase font-black group-hover:text-indigo-400">{{key}}</div>
                        <div class="text-xs font-mono text-slate-400">{{val}}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
