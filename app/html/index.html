<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero HTML</title>
    <link rel="stylesheet" href="../../share/theme.css">
    <script src="../../share/cdn.js"></script>
    <style>
        [v-cloak] { display: none; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        .avero-app { padding: 40px; text-align: left; }

        .editor-container { height: calc(100vh - 220px); position: relative; max-width: 1200px; }
        .editor {
            width: 100%; height: 100%; background: #070707; border: 1px solid #1a1a1a;
            padding: 30px; color: #818cf8; font-family: 'JetBrains Mono', monospace;
            outline: none; resize: none; border-radius: 24px; font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .editor:focus { border-color: #6366f1; box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); }

        .bottom-dock { height: 80px; display: flex; align-items: center; gap: 20px; justify-content: flex-start; }

        .btn-main { background: #fff; color: #000; font-weight: 900; padding: 12px 30px; border-radius: 100px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; border: none; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: #888; font-weight: 800; padding: 12px 25px; border-radius: 100px; text-transform: uppercase; font-size: 10px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-ghost:hover { background: #6366f1; color: #fff; border-color: #6366f1; }

        .preset-tray {
            position: absolute; bottom: 80px; left: 0; background: #111;
            border: 1px solid #222; border-radius: 20px; padding: 15px;
            display: flex; gap: 10px; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .preset-item { background: #1a1a1a; padding: 8px 16px; border-radius: 10px; font-size: 10px; font-weight: 900; white-space: nowrap; cursor: pointer; color: #666; transition: 0.2s; }
        .preset-item:hover { color: #fff; background: #333; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="avero-app">
    <div id="app" v-cloak class="h-full flex flex-col items-start">

        <div class="w-full max-width-[1200px] flex justify-between items-end mb-8">
            <div class="text-left">
                <h1 class="text-6xl font-black italic tracking-tighter uppercase leading-none">HTML Console</h1>
                <p class="text-[9px] text-zinc-600 font-bold tracking-[0.4em] uppercase mt-2">External Link Linker & Preset Console</p>
            </div>
            <button @click="launchToDesktop" class="btn-main">Launch Live Tab</button>
        </div>

        <div class="editor-container w-full">
            <textarea v-model="code" class="editor" placeholder="Enter code or load a link..."></textarea>
        </div>

        <div class="bottom-dock relative w-full">
            <button @click="showPresets = !showPresets" class="btn-ghost">Recommended HTML</button>
            <span class="text-[9px] font-black text-zinc-800 uppercase tracking-widest">Avero System Link v2.4</span>

            <transition name="fade">
                <div v-if="showPresets" class="preset-tray">
                    <div v-for="p in internalPresets"
                         @click="loadPreset(p.content)"
                         class="preset-item uppercase tracking-widest">
                        {{ p.name }}
                    </div>
                </div>
            </transition>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const code = ref("");
                const showPresets = ref(false);

                // Add your names and URLs or raw HTML strings here
                const internalPresets = ref([
                    { name: "", content: "" },
                ]);

                const loadPreset = async (content) => {
                    // If content is a URL, fetch it; otherwise, load it directly
                    if (content.startsWith('http')) {
                        try {
                            const res = await fetch(content);
                            code.value = await res.text();
                        } catch (err) {
                            console.error("Avero Protocol Error: Link failed.");
                            code.value = "";
                        }
                    } else {
                        code.value = content;
                    }
                    showPresets.value = false;
                };

                const launchToDesktop = () => {
                    const wrappedCode = `
                        <script>
                            document.addEventListener('visibilitychange', () => {
                                if (document.hidden) { document.body.style.opacity = '0.3'; }
                                else { document.body.style.opacity = '1'; }
                            });
                        <\/script>
                        ${code.value}
                    `;

                    window.parent.postMessage({
                        type: 'AVERO_OPEN_TAB',
                        title: 'Live Preview',
                        content: wrappedCode
                    }, '*');
                };

                return { code, internalPresets, showPresets, loadPreset, launchToDesktop };
            }
        }).mount('#app');
    </script>
</body>
</html>
