<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Clicker</title>
    <script src="../../share/cdn.js"></script>
    <style>
        .game-container { max-width: 1200px; margin: 2rem auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 2rem; }
        .click-area { position: sticky; top: 2rem; height: fit-content; text-align: center; padding: 3rem; background: rgba(255,255,255,0.03); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }

        .main-btn {
            width: 200px; height: 200px; border-radius: 50%; border: 10px solid #10b981;
            background: radial-gradient(circle, #064e3b 0%, #022c22 100%); color: white; cursor: pointer;
            transition: transform 0.05s, box-shadow 0.2s; box-shadow: 0 0 30px rgba(16,185,129,0.15);
        }
        .main-btn:active { transform: scale(0.95); }

        .upgrade-list { display: flex; flex-direction: column; gap: 8px; height: 85vh; overflow-y: auto; padding-right: 12px; }
        .upgrade-card {
            background: #0f172a; padding: 12px 16px; border-radius: 10px; border: 1px solid #1e293b;
            display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; cursor: pointer;
        }
        .upgrade-card:not(.disabled):hover { border-color: #10b981; background: #111827; }
        .upgrade-card.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .upgrade-card.maxed { border-color: #f59e0b; opacity: 0.8; }

        .toggle-btn {
            background: #1e293b; border: 1px solid #334155; padding: 6px 12px; border-radius: 6px;
            font-size: 10px; font-weight: 900; color: #94a3b8; cursor: pointer;
        }
        .toggle-btn.active { background: #10b981; color: white; border-color: #059669; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="avero-app bg-slate-950 text-slate-100">

    <div id="app" v-cloak class="p-8">
        <header class="flex justify-between items-center mb-8 max-w-7xl mx-auto">
            <h1 class="text-4xl font-black italic">CLICKER</h1>
            <div class="flex gap-4 items-center">
                <input v-model="searchTerm" placeholder="Search upgrades..." class="bg-black/40 border border-slate-800 rounded px-3 py-1 text-xs outline-none focus:border-emerald-500">
                <button @click="buyAmount = 1" :class="['toggle-btn', buyAmount === 1 ? 'active' : '']">1X</button>
                <button @click="buyAmount = 10" :class="['toggle-btn', buyAmount === 10 ? 'active' : '']">10X</button>
            </div>
        </header>

        <div class="game-container">
            <div class="click-area">
                <h2 class="text-5xl font-black text-white mb-4">${{ formatNum(money) }}</h2>
                <button @click="doClick" class="main-btn">
                    <span class="text-4xl font-black">CLICK</span>
                </button>
                <p class="text-emerald-400 font-mono text-sm mt-6">+{{ formatNum(clickPower) }} / click</p>
                <button @click="resetGame" class="mt-12 text-[9px] text-slate-600 hover:text-red-500 uppercase font-bold tracking-widest">Wipe Save Data</button>
            </div>

            <div class="upgrade-list">
                <div v-for="(upg, index) in filteredUpgrades" :key="upg.id"
                     :class="['upgrade-card', canAfford(upg.cost * buyAmount) ? '' : 'disabled', upg.level >= 100 ? 'maxed' : '']"
                     @click="buyUpgrade(upg.id)">

                    <div class="flex items-center gap-4">
                        <span class="text-slate-700 font-mono text-xs">#{{ upg.id + 1 }}</span>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-sm">{{ upg.name }}</span>
                                <span class="text-[9px] bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">LVL {{ upg.level }}</span>
                            </div>
                        </div>
                    </div>

                    <div class="text-right">
                        <div v-if="upg.level < 100" class="text-emerald-400 font-mono text-xs font-bold">
                            ${{ formatNum(upg.cost * (buyAmount === 10 && (upg.level + 10 > 100) ? (100 - upg.level) : buyAmount)) }}
                        </div>
                        <div v-else class="text-amber-500 text-[10px] font-black">MAXED</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const money = ref(0);
                const buyAmount = ref(1);
                const searchTerm = ref('');
                const upgrades = ref([]);

                // Generate 100 Upgrades with scaling costs and boosts
                const initUpgrades = () => {
                    const list = [];
                    const names = ["Switch", "Spring", "Plate", "Script", "Core", "Node", "Link", "Pulse", "Wave", "Logic"];
                    const prefixes = ["Micro", "Nano", "Pico", "Cyber", "Quantum", "Plasma", "Aero", "Void", "Omni", "Hyper"];

                    for (let i = 0; i < 100; i++) {
                        const pre = prefixes[Math.floor(i / 10)];
                        const suf = names[i % 10];
                        list.push({
                            id: i,
                            name: `${pre} ${suf}`,
                            cost: Math.floor(15 * Math.pow(1.4, i)),
                            boost: Math.floor(1 * Math.pow(1.35, i)),
                            level: 0
                        });
                    }
                    upgrades.value = list;
                };

                const filteredUpgrades = computed(() => {
                    return upgrades.value.filter(u => u.name.toLowerCase().includes(searchTerm.value.toLowerCase()));
                });

                const clickPower = computed(() => {
                    return 1 + upgrades.value.reduce((acc, upg) => acc + (upg.level * upg.boost), 0);
                });

                const doClick = () => { money.value += clickPower.value; save(); };
                const canAfford = (cost) => money.value >= cost;

                const buyUpgrade = (id) => {
                    const upg = upgrades.value[id];
                    let count = buyAmount.value;
                    if (upg.level + count > 100) count = 100 - upg.level;
                    if (count <= 0) return;

                    const totalCost = upg.cost * count;
                    if (money.value >= totalCost) {
                        money.value -= totalCost;
                        upg.level += count;
                        save();
                    }
                };

                const formatNum = (num) => {
                    if (num >= 1e15) return (num / 1e15).toFixed(2) + 'Q';
                    if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
                    if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
                    if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
                    if (num >= 1e3) return (num / 1e3).toFixed(1) + 'k';
                    return Math.floor(num).toLocaleString();
                };

                const save = () => {
                    localStorage.setItem('clicker_save_100', JSON.stringify({
                        money: money.value,
                        levels: upgrades.value.map(u => u.level)
                    }));
                };

                const resetGame = () => {
                    if(confirm("Wipe all progress?")) {
                        localStorage.removeItem('clicker_save_100');
                        location.reload();
                    }
                };

                onMounted(() => {
                    initUpgrades();
                    const raw = localStorage.getItem('clicker_save_100');
                    if (raw) {
                        const data = JSON.parse(raw);
                        money.value = data.money || 0;
                        data.levels.forEach((lvl, i) => {
                            if (upgrades.value[i]) upgrades.value[i].level = lvl;
                        });
                    }
                });

                return { money, upgrades, filteredUpgrades, clickPower, doClick, buyUpgrade, canAfford, formatNum, buyAmount, searchTerm, resetGame };
            }
        }).mount('#app');
    </script>
</body>
</html>
