<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Calculator</title>
    <script libs="core,math" src="../share/cdn.js"></script>
</head>
<body class="bg-[#020617] text-slate-300 p-4 font-sans overflow-x-hidden">
    <div id="app" v-cloak class="max-w-7xl mx-auto">

        <!-- Header & Main Mode Toggle -->
        <div class="flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-6 mb-8 gap-6">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Avero <span class="text-indigo-500">Calculator</span></h1>

            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                <button @click="mode = 'scientific'" :class="mode === 'scientific' ? 'bg-indigo-600 text-white' : 'text-slate-500'" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Scientific</button>
                <button @click="mode = 'graphing'" :class="mode === 'graphing' ? 'bg-indigo-600 text-white' : 'text-slate-500'" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Graphing</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <!-- Side Log / History -->
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 h-[600px] flex flex-col">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> {{ mode === 'scientific' ? 'History' : 'Equations' }}
                    </span>

                    <div v-if="mode === 'scientific'" class="overflow-y-auto flex-grow space-y-4">
                        <div v-for="h in history" @click="input = h.res" class="group cursor-pointer border-l-2 border-transparent hover:border-indigo-500 pl-3 transition-all">
                            <div class="text-[10px] text-slate-600 truncate group-hover:text-slate-400">{{ h.exp }}</div>
                            <div class="text-sm font-mono text-emerald-500 font-bold"> {{ h.res }}</div>
                        </div>
                    </div>

                    <div v-else class="space-y-3">
                        <div v-for="(eq, i) in graphEquations" :key="i" class="bg-black/40 p-3 rounded-lg border border-slate-800">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[9px] font-bold" :style="{color: eq.color}">Y{{i+1}}</span>
                                <button @click="removeEquation(i)" class="text-rose-500 text-[10px]">✕</button>
                            </div>
                            <input v-model="eq.text" @input="drawGraph" class="w-full bg-transparent border-b border-slate-700 text-xs text-white outline-none" placeholder="e.g. sin(x)">
                        </div>
                        <button @click="addEquation" class="w-full py-2 border border-dashed border-slate-700 rounded-lg text-[10px] uppercase font-bold hover:bg-white/5 transition-all">+ Add Plot</button>
                    </div>
                </div>
            </div>

            <!-- Main Panel -->
            <div class="lg:col-span-9 space-y-6">

                <!-- SCIENTIFIC MODULE -->
                <div v-if="mode === 'scientific'" class="space-y-6 animate-in fade-in zoom-in duration-300">
                    <div class="bg-slate-900/80 border border-slate-800 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                        <input v-model="input" @keyup.enter="exec" ref="term" class="w-full text-6xl avero-input p-2 mb-2 font-light" placeholder="0">
                        <div class="text-xs text-slate-500 font-mono italic mt-2">{{ formula || 'ready_for_input' }}</div>

                        <!-- Secondary Tabs for Sci Mode -->
                        <div class="flex gap-2 mt-8 mb-4">
                            <button v-for="t in ['math', 'trig', 'prob']" @click="activeTab = t" :class="activeTab === t ? 'tab-active' : ''" class="px-4 py-1 text-[9px] font-black rounded-full border border-slate-800 transition-all uppercase">{{t}}</button>
                        </div>

                        <div class="grid grid-cols-4 md:grid-cols-6 gap-2">
                            <template v-if="activeTab === 'math'">
                                <button v-for="f in ['sqrt','log','abs','ceil','floor','cbrt','sign','exp','mod']" @click="add(f+'(')" class="func-btn py-3 rounded-lg">{{f}}</button>
                            </template>
                            <template v-if="activeTab === 'trig'">
                                <button v-for="f in ['sin','cos','tan','asin','acos','atan','sinh','cosh','tanh']" @click="add(f+'(')" class="func-btn py-3 rounded-lg">{{f}}</button>
                            </template>
                            <template v-if="activeTab === 'prob'">
                                <button v-for="f in ['factorial','random','gamma','erf','pi','e']" @click="add(f)" class="func-btn py-3 rounded-lg">{{f}}</button>
                            </template>

                            <button @click="add('(')" class="func-btn op-btn rounded-lg">(</button>
                            <button @click="add(')')" class="func-btn op-btn rounded-lg">)</button>
                            <button @click="add('^')" class="func-btn op-btn rounded-lg">xʸ</button>
                            <button @click="input = ''" class="func-btn text-rose-500 border-rose-900/30 rounded-lg">AC</button>
                            <button @click="exec" class="col-span-4 md:col-span-2 bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-black py-4 rounded-xl shadow-lg transition-all uppercase">Execute</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div v-for="(val, key) in constants" @click="add(key)" class="bg-slate-900/40 border border-slate-800 p-3 rounded-xl cursor-pointer hover:border-indigo-500 transition-all group">
                            <div class="text-[9px] text-slate-500 uppercase font-black group-hover:text-indigo-400">{{key}}</div>
                            <div class="text-xs font-mono text-slate-400">{{val}}</div>
                        </div>
                    </div>
                </div>

                <!-- GRAPHING MODULE -->
                <div v-if="mode === 'graphing'" class="bg-slate-900 border border-slate-800 rounded-3xl p-4 shadow-2xl relative overflow-hidden animate-in fade-in zoom-in duration-300">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <div class="flex gap-4">
                            <span class="text-[10px] font-bold text-slate-500">ZOOM: {{zoom}}x</span>
                            <span class="text-[10px] font-bold text-slate-500">CENTER: 0,0</span>
                        </div>
                        <div class="flex gap-2">
                            <button @click="zoomIn" class="w-8 h-8 bg-slate-800 rounded-lg hover:bg-slate-700">+</button>
                            <button @click="zoomOut" class="w-8 h-8 bg-slate-800 rounded-lg hover:bg-slate-700">-</button>
                        </div>
                    </div>
                    <canvas ref="graphCanvas" class="w-full h-[500px] rounded-2xl border border-slate-800"></canvas>
                    <div class="mt-4 p-4 bg-black/30 rounded-xl border border-slate-800">
                        <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Graph Navigator</p>
                        <p class="text-[11px] text-slate-500">Use the list on the left to add functions. The grapher supports <b>x</b> as the independent variable.</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
