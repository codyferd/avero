<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avero Fallpiece</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body class="bg-[#080808] text-slate-200 font-sans overflow-hidden select-none touch-none">
    <div id="app" v-cloak class="h-screen w-screen flex flex-col justify-between items-center p-3 box-border overflow-hidden">

        <div class="flex w-full max-w-[550px] justify-between items-center px-2 py-1 flex-none">
            <div class="flex gap-4 items-center">
                <h1 class="text-xs font-black uppercase tracking-widest text-zinc-400 font-mono hidden sm:block">Avero Fallpiece</h1>
                <div class="text-left">
                    <span class="block text-[8px] text-zinc-500 font-bold uppercase tracking-wider">Score</span>
                    <span class="text-base font-black font-mono text-emerald-400">{{ score }}</span>
                </div>
                <div class="text-left">
                    <span class="block text-[8px] text-zinc-500 font-bold uppercase tracking-wider">Level</span>
                    <span class="text-base font-black font-mono text-white">{{ level }}</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl px-3 py-1.5">
                <span class="text-[8px] font-black uppercase font-mono tracking-wider text-zinc-500">Next Unit</span>
                <canvas ref="nextCanvasUniversal" width="60" height="30" class="block"></canvas>
            </div>
        </div>

        <div class="flex-1 w-full max-w-[550px] flex items-center justify-center p-1 overflow-hidden">
            <div class="arena-container" ref="canvasWrapper">
                <div class="relative game-border p-1 bg-white/5 rounded-xl box-border flex items-center justify-center">
                    <canvas ref="gameCanvas" class="rounded-lg bg-black block shadow-inner"></canvas>

                    <div v-if="!gameState.running" class="absolute inset-0 flex items-center justify-center bg-black/85 backdrop-blur-sm rounded-xl z-50">
                        <div class="text-center px-4">
                            <h2 class="text-2xl md:text-3xl font-black italic tracking-tighter mb-4 uppercase text-white">
                                {{ gameState.gameOver ? 'Core Terminated' : 'Fallpiece Engine' }}
                            </h2>
                            <button @click="startGame" class="avero-btn text-xs">
                                {{ gameState.gameOver ? 'Reboot System' : 'Initialize Matrix' }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full max-w-[420px] flex-none flex flex-col gap-1.5 mt-2 mb-1 z-40">
            <div class="flex justify-between gap-1.5">
                <button @mousedown="sendInput('KeyA')" @touchstart.prevent="sendInput('KeyA')" class="touch-btn flex-1 text-xs">◀ A</button>
                <button @mousedown="sendInput('KeyW')" @touchstart.prevent="sendInput('KeyW')" class="touch-btn flex-1 text-xs">🔄 ROTATE W</button>
                <button @mousedown="sendInput('KeyD')" @touchstart.prevent="sendInput('KeyD')" class="touch-btn flex-1 text-xs">▶ D</button>
            </div>
            <div class="flex justify-between gap-1.5">
                <button @mousedown="sendInput('KeyS')" @touchstart.prevent="sendInput('KeyS')" class="touch-btn flex-1 py-2.5 text-[10px] uppercase font-bold">⏬ Soft Drop</button>
                <button @mousedown="sendInput('Space')" @touchstart.prevent="sendInput('Space')" class="touch-btn flex-[1.5] py-2.5 text-[10px] uppercase font-bold bg-emerald-500/10 border-emerald-500/30 text-emerald-400">💥 Instant Drop</button>
                <button @mousedown="sendInput('KeyP')" @touchstart.prevent="sendInput('KeyP')" class="touch-btn w-12 py-2.5 text-[10px]">⏸ P</button>
            </div>
        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
