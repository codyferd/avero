<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Fallpiece</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body class="bg-[#080808] text-slate-200 font-sans overflow-hidden select-none">
    <div id="app" v-cloak class="min-h-screen flex items-center justify-center p-4">

        <!-- Game Interface -->
        <div class="flex flex-col md:flex-row gap-8 items-start">

            <!-- Side Panel: Stats -->
            <div class="flex flex-col gap-4 w-32 order-2 md:order-1">
                <div class="stat-card">
                    <label class="stat-label">Score</label>
                    <div class="stat-value text-emerald-400">{{ score }}</div>
                </div>
                <div class="stat-card">
                    <label class="stat-label">Level</label>
                    <div class="stat-value text-white">{{ level }}</div>
                </div>
                <div class="stat-card">
                    <label class="stat-label">Lines</label>
                    <div class="stat-value text-slate-400 text-sm">{{ lines }}</div>
                </div>
            </div>

            <!-- Main Canvas -->
            <div class="relative order-1 md:order-2">
                <div class="game-border p-1 bg-white/5 rounded-xl">
                    <canvas ref="gameCanvas" width="300" height="600" class="rounded-lg bg-black"></canvas>
                </div>

                <!-- Overlays -->
                <div v-if="!gameState.running" class="absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-sm rounded-xl">
                    <div class="text-center">
                        <h2 class="text-4xl font-black italic tracking-tighter mb-6 uppercase text-white">
                            {{ gameState.gameOver ? 'Terminated' : 'Fallpiece' }}
                        </h2>
                        <button @click="startGame" class="avero-btn">
                            {{ gameState.gameOver ? 'Reboot' : 'Initialize' }}
                        </button>
                    </div>
                </div>
            </div>

            <!-- Side Panel: Next Piece -->
            <div class="flex flex-col gap-4 w-32 order-3">
                <div class="stat-card h-32 flex flex-col items-center justify-center">
                    <label class="stat-label mb-2">Next</label>
                    <canvas ref="nextCanvas" width="80" height="80"></canvas>
                </div>

                <div class="text-[10px] font-mono text-slate-600 uppercase mt-4">
                    Arrows: Move/Rotate<br>
                    Space: Hard Drop<br>
                    P: Pause
                </div>
            </div>

        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
