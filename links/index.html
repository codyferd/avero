<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avero Links</title>
    <script libs="core" src="../share/cdn.js"></script>
</head>
<body>
<div id="app" v-cloak class="min-h-screen bg-slate-950 text-white font-sans">
    
    <!-- Mobile Navigation Banner -->
    <div class="md:hidden flex items-center justify-between p-4 border-b border-white/10 bg-slate-900/50">
        <h1 class="text-xl font-bold tracking-widest">AVERO <span class="text-indigo-400">LINKS</span></h1>
        <button @click="isSidebarOpen = !isSidebarOpen" class="p-2 text-slate-400 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </div>

    <div class="flex h-screen overflow-hidden">
        
        <!-- Application Navigation Bar Sidebar -->
        <aside :class="{'hidden': !isSidebarOpen, 'flex': isSidebarOpen}" class="fixed inset-0 z-50 md:relative md:flex flex-col w-64 bg-slate-900/90 backdrop-blur-xl border-r border-white/10">
            <div class="p-4 border-b border-white/5">
                <input type="text" v-model="search" :placeholder="'Search ' + currentCategory + '...'" class="w-full bg-slate-950 border border-white/10 p-3 rounded-xl focus:border-indigo-500 outline-none transition text-sm">
            </div>

            <!-- Category Switcher Controls -->
            <div class="grid grid-cols-2 p-4 gap-2 border-b border-white/5 text-xs font-bold tracking-wider">
                <button @click="currentCategory = 'apps'; search = ''" :class="currentCategory === 'apps' ? 'bg-indigo-600 text-white' : 'bg-slate-950 text-slate-400 border border-white/5'" class="py-2.5 rounded-lg transition uppercase">Apps</button>
                <button @click="currentCategory = 'games'; search = ''" :class="currentCategory === 'games' ? 'bg-indigo-600 text-white' : 'bg-slate-950 text-slate-400 border border-white/5'" class="py-2.5 rounded-lg transition uppercase">Games</button>
            </div>

            <!-- Vertical Item Navigation Index -->
            <nav class="flex-1 overflow-y-auto p-3 space-y-1">
                <div v-for="item in filteredItems" :key="item.name" class="group flex flex-col p-2.5 rounded-xl hover:bg-white/5 transition border border-transparent hover:border-white/5">
                    <span class="text-sm font-medium text-slate-200 mb-2 truncate px-1">{{ item.name }}</span>
                    <div class="grid grid-cols-2 gap-1.5 opacity-80 group-hover:opacity-100 transition">
                        <button @click="launchLink(item, 'internal'); isSidebarOpen = false" class="py-1 text-[11px] font-bold bg-indigo-600/30 hover:bg-indigo-600 text-indigo-300 hover:text-white rounded-md transition uppercase">Avero Tab</button>
                        <button @click="launchLink(item, 'external'); isSidebarOpen = false" class="py-1 text-[11px] font-bold bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-md transition uppercase">External</button>
                    </div>
                </div>
                <div v-if="filteredItems.length === 0" class="text-center text-xs text-slate-500 pt-8">No links found.</div>
            </nav>
        </aside>

        <!-- Main Workspace Deck Grid Dashboard -->
        <main class="flex-1 overflow-y-auto p-6 md:p-10 bg-gradient-to-br from-slate-950 via-slate-950 to-black">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-3xl font-bold tracking-tight">Avero <span class="text-indigo-400 capitalize">{{ currentCategory }}</span></h1>
                <span class="text-xs font-mono px-3 py-1 bg-white/5 rounded-full border border-white/10 text-slate-400">{{ filteredItems.length }} Available</span>
            </div>

            <!-- Content Card Component Loop -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <div v-for="item in filteredItems" :key="item.name" class="flex flex-col bg-slate-900/40 border border-white/10 rounded-2xl overflow-hidden hover:border-indigo-500/50 transition-all duration-300 group">
                    <div class="aspect-video overflow-hidden relative bg-slate-950">
                        <img :src="item.image || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect width=\'100\' height=\'100\' fill=\'%230f172a\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23334155\' font-size=\'12\'>AVERO</text></svg>'" :alt="item.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between bg-slate-900/20">
                        <h3 class="font-semibold tracking-wide text-slate-100 mb-4 truncate">{{ item.name }}</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <button @click="launchLink(item, 'internal')" class="py-2.5 text-xs font-bold bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition uppercase shadow-lg shadow-indigo-600/10">Avero Tab</button>
                            <button @click="launchLink(item, 'external')" class="py-2.5 text-xs font-bold bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl transition uppercase border border-white/5">External</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

    <script src="list.js"></script>
    <script src="index.js"></script>
</body>
</html>
